<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ZenFit 🏋️</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; font-family: Inter, system-ui, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;

    const STORAGE_KEY = "zenfit_workouts";
    const loadWorkouts = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } };
    const saveWorkouts = (w) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); } catch {} };

    const exerciseEmoji = {
      "Bodyweight Glute Bridge":"🍑","Banded Clamshells":"🦵","Bird Dog":"🐦",
      "Barbell Hip Thrust":"🍑","Seated Leg Curl (unilateral)":"🦵","Dumbbell Step-Up":"🦵",
      "Cable Kickback":"🍑","Pallof Press":"🧘","Band Pull-Apart":"💪",
      "Wall Slides":"🧱","Dead Bug":"🧘","Incline Dumbbell Press (30°)":"💪",
      "Machine Chest Press":"💪","Seated DB Shoulder Press":"🏋️","Cable Lateral Raise":"💪",
      "Overhead Cable Tricep Extension":"💪","Push Up":"💪","BW Split Squat Hold":"🦵",
      "Banded Lateral Walk":"🦵","McGill Curl-Up":"🧘","Leg Press (45° sled)":"🦵",
      "Bulgarian Split Squat (DBs)":"🦵","Leg Extension (unilateral)":"🦵",
      "Hip Abduction Machine":"🍑","Sumo Squat":"🦵","Straight-Arm Band Pulldown":"💪",
      "Banded External Rotation":"🔄","Cat-Cow":"🧘","Lat Pulldown (wide grip)":"💪",
      "Chest-Supported DB Row":"💪","Single-Arm Cable Row":"💪","Cable Face Pull":"💪",
      "Seated DB Bicep Curl":"💪","Pull Up":"💪","Single-Leg Glute Bridge":"🍑",
      "Side Plank":"🧘","Single-Leg Leg Press":"🦵","Single-Arm Lat Pulldown":"💪",
      "Single-Leg Romanian DL":"🦵","Single-Arm Cable Chest Press":"💪","Lateral Band Walk":"🦵",
    };

    const mkSets = (n) => Array.from({length:n},(_,i)=>({type:String(i+1),prev:"",weight:"",reps:"",done:false,locked:false}));

    const TEMPLATES = [
      { id:1, name:"Day 1 Glutes & Hams", exercises:[
        {name:"Bodyweight Glute Bridge",emoji:"🍑",sets:mkSets(2)},
        {name:"Barbell Hip Thrust",emoji:"🏋️",sets:mkSets(4)},
        {name:"Seated Leg Curl (unilateral)",emoji:"🦵",sets:mkSets(3)},
        {name:"Dumbbell Step-Up",emoji:"⬆️",sets:mkSets(3)},
        {name:"Cable Kickback",emoji:"🦶",sets:mkSets(3)},
      ]},
      { id:2, name:"Day 2 Push", exercises:[
        {name:"Incline Dumbbell Press (30°)",emoji:"💪",sets:mkSets(4)},
        {name:"Machine Chest Press",emoji:"🏋️",sets:mkSets(3)},
        {name:"Seated DB Shoulder Press",emoji:"🏋️",sets:mkSets(3)},
        {name:"Cable Lateral Raise",emoji:"↔️",sets:mkSets(3)},
        {name:"Push Up",emoji:"⬇️",sets:mkSets(2)},
      ]},
      { id:3, name:"Day 3 Quads & Glutes", exercises:[
        {name:"Leg Press (45° sled)",emoji:"🏋️",sets:mkSets(4)},
        {name:"Bulgarian Split Squat (DBs)",emoji:"🦵",sets:mkSets(3)},
        {name:"Leg Extension (unilateral)",emoji:"🦵",sets:mkSets(3)},
        {name:"Hip Abduction Machine",emoji:"🍑",sets:mkSets(3)},
        {name:"Sumo Squat",emoji:"🏋️",sets:mkSets(3)},
      ]},
      { id:4, name:"Day 4 Pull", exercises:[
        {name:"Lat Pulldown (wide grip)",emoji:"🏋️",sets:mkSets(4)},
        {name:"Chest-Supported DB Row",emoji:"🏋️",sets:mkSets(4)},
        {name:"Single-Arm Cable Row",emoji:"💪",sets:mkSets(3)},
        {name:"Cable Face Pull",emoji:"🎯",sets:mkSets(3)},
        {name:"Seated DB Bicep Curl",emoji:"💪",sets:mkSets(3)},
      ]},
      { id:5, name:"Day 5 Imbalance", exercises:[
        {name:"Single-Leg Leg Press",emoji:"🦵",sets:mkSets(3)},
        {name:"Single-Arm Lat Pulldown",emoji:"💪",sets:mkSets(3)},
        {name:"Single-Leg Romanian DL",emoji:"🏋️",sets:mkSets(3)},
        {name:"Lateral Band Walk",emoji:"↔️",sets:mkSets(2)},
      ]},
    ];

    const exerciseLibrary = {
      "Day 1 - Glutes & Hams":[
        {name:"Bodyweight Glute Bridge",emoji:"🍑"},{name:"Banded Clamshells",emoji:"🦵"},
        {name:"Bird Dog",emoji:"🐦"},{name:"Barbell Hip Thrust",emoji:"🏋️"},
        {name:"Seated Leg Curl (unilateral)",emoji:"🦵"},{name:"Dumbbell Step-Up",emoji:"⬆️"},
        {name:"Cable Kickback",emoji:"🦶"},{name:"Pallof Press",emoji:"💪"},
      ],
      "Day 2 - Push":[
        {name:"Band Pull-Apart",emoji:"🎯"},{name:"Wall Slides",emoji:"🧱"},
        {name:"Dead Bug",emoji:"🐛"},{name:"Incline Dumbbell Press (30°)",emoji:"💪"},
        {name:"Machine Chest Press",emoji:"🏋️"},{name:"Seated DB Shoulder Press",emoji:"🏋️"},
        {name:"Cable Lateral Raise",emoji:"↔️"},{name:"Overhead Cable Tricep Extension",emoji:"💪"},
        {name:"Push Up",emoji:"⬇️"},
      ],
      "Day 3 - Quads & Glutes":[
        {name:"BW Split Squat Hold",emoji:"🦵"},{name:"Banded Lateral Walk",emoji:"↔️"},
        {name:"McGill Curl-Up",emoji:"🧘"},{name:"Leg Press (45° sled)",emoji:"🏋️"},
        {name:"Bulgarian Split Squat (DBs)",emoji:"🦵"},{name:"Leg Extension (unilateral)",emoji:"🦵"},
        {name:"Hip Abduction Machine",emoji:"🍑"},{name:"Sumo Squat",emoji:"🏋️"},
      ],
      "Day 4 - Pull":[
        {name:"Straight-Arm Band Pulldown",emoji:"💪"},{name:"Banded External Rotation",emoji:"🔄"},
        {name:"Cat-Cow",emoji:"🐱"},{name:"Lat Pulldown (wide grip)",emoji:"🏋️"},
        {name:"Chest-Supported DB Row",emoji:"🏋️"},{name:"Single-Arm Cable Row",emoji:"💪"},
        {name:"Cable Face Pull",emoji:"🎯"},{name:"Seated DB Bicep Curl",emoji:"💪"},
        {name:"Pull Up",emoji:"⬆️"},
      ],
      "Day 5 - Imbalance":[
        {name:"Single-Leg Glute Bridge",emoji:"🍑"},{name:"Side Plank",emoji:"🧘"},
        {name:"Band Pull-Apart",emoji:"🎯"},{name:"Single-Leg Leg Press",emoji:"🦵"},
        {name:"Single-Arm Lat Pulldown",emoji:"💪"},{name:"Single-Leg Romanian DL",emoji:"🏋️"},
        {name:"Single-Arm Cable Chest Press",emoji:"💪"},{name:"Lateral Band Walk",emoji:"↔️"},
      ],
    };

    function RestTimerBar({seconds,onDone}){
      const [rem,setRem]=useState(seconds);
      useEffect(()=>{
        if(rem<=0){onDone&&onDone();return;}
        const t=setTimeout(()=>setRem(r=>r-1),1000);
        return()=>clearTimeout(t);
      },[rem]);
      const pct=(rem/seconds)*100;
      return(
        <div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
          <div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:"#3b82f6",transition:"width 1s linear"}}/>
          </div>
          <span style={{fontSize:12,color:"#3b82f6",fontWeight:700,minWidth:36}}>
            {Math.floor(rem/60)}:{String(rem%60).padStart(2,"0")}
          </span>
        </div>
      );
    }

    function WorkoutTimer({startTime}){
      const [el,setEl]=useState(0);
      useEffect(()=>{
        const iv=setInterval(()=>setEl(Math.floor((Date.now()-startTime)/1000)),1000);
        return()=>clearInterval(iv);
      },[startTime]);
      const h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
      return <span>{h>0?h+":":""}{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;
    }

    function App(){
      const [screen,setScreen]=useState("home");
      const [workouts,setWorkouts]=useState(()=>loadWorkouts());
      const [viewWorkout,setViewWorkout]=useState(null);
      const [tab,setTab]=useState("start");
      const [workoutName,setWorkoutName]=useState("");
      const [exercises,setExercises]=useState([]);
      const [startTime,setStartTime]=useState(null);
      const [restTimers,setRestTimers]=useState({});
      const [showAddPanel,setShowAddPanel]=useState(false);
      const [selectedDay,setSelectedDay]=useState("");
      const [customName,setCustomName]=useState("");
      const [showCustom,setShowCustom]=useState(false);

      const dateLabel=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
      const totalVol=(exs)=>exs.reduce((a,ex)=>a+ex.sets.reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0);
      const totalSets=(exs)=>exs.reduce((a,ex)=>a+ex.sets.length,0);

      const getPrev=(exName)=>{
        for(const w of [...workouts].sort((a,b)=>b.id-a.id)){
          const f=w.exercises?.find(e=>e.name===exName);
          if(f){
            const v=f.sets.filter(s=>s.weight&&s.reps);
            if(v.length){
              const best=[...v].sort((a,b)=>(parseFloat(b.weight)*parseInt(b.reps))-(parseFloat(a.weight)*parseInt(a.reps)))[0];
              return best.weight+"lb x "+best.reps;
            }
          }
        }
        return "";
      };

      const startFromTemplate=(tmpl)=>{
        setStartTime(Date.now());setWorkoutName(tmpl.name);
        setExercises(tmpl.exercises.map((ex,i)=>({
          id:Date.now()+i,name:ex.name,emoji:exerciseEmoji[ex.name]||ex.emoji,note:"",restTime:120,
          sets:ex.sets.map(s=>({...s,prev:getPrev(ex.name)})),
        })));
        setRestTimers({});setShowAddPanel(false);setScreen("workout");
      };

      const startEmpty=()=>{
        setStartTime(Date.now());setWorkoutName("My Workout");setExercises([]);
        setRestTimers({});setShowAddPanel(false);setScreen("workout");
      };

      const addEx=(exObj)=>{
        const prev=getPrev(exObj.name);
        setExercises(p=>[...p,{id:Date.now(),name:exObj.name,emoji:exerciseEmoji[exObj.name]||exObj.emoji||"💪",note:"",restTime:120,sets:[{type:"1",prev,weight:"",reps:"",done:false,locked:false}]}]);
        setShowAddPanel(false);setSelectedDay("");setShowCustom(false);setCustomName("");
      };

      const updateSet=(exId,si,field,val)=>setExercises(prev=>prev.map(ex=>ex.id===exId?{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,[field]:val}:s)}:ex));

      const toggleDone=(exId,si)=>setExercises(prev=>prev.map(ex=>{
        if(ex.id!==exId||ex.sets[si]?.locked)return ex;
        const nd=!ex.sets[si].done;
        if(nd)setRestTimers(rt=>({...rt,[exId+"-"+si]:true}));
        else setRestTimers(rt=>{const c={...rt};delete c[exId+"-"+si];return c;});
        return{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,done:nd}:s)};
      }));

      const addSet=(exId)=>setExercises(prev=>prev.map(ex=>{
        if(ex.id!==exId)return ex;
        return{...ex,sets:[...ex.sets,{type:String(ex.sets.length+1),prev:getPrev(ex.name),weight:"",reps:"",done:false,locked:false}]};
      }));

      const finishWorkout=()=>{
        if(!exercises.length)return;
        const dur=Math.round((Date.now()-startTime)/60000);
        const w={id:Date.now(),name:workoutName,date:dateLabel,duration:dur,exercises,volume:totalVol(exercises),sets:totalSets(exercises)};
        setWorkouts(prev=>{const u=[w,...prev];saveWorkouts(u);return u;});
        setScreen("home");
      };

      /* ── WORKOUT SCREEN ── */
      if(screen==="workout"){
        return(
          <div style={{fontFamily:"Inter,sans-serif",background:"#fff",minHeight:"100vh",maxWidth:390,margin:"0 auto",display:"flex",flexDirection:"column"}}>
            <div style={{background:"#fff",padding:"14px 16px 10px",borderBottom:"1px solid #f0f0f0",position:"sticky",top:0,zIndex:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div onClick={()=>setScreen("home")} style={{width:40,height:40,borderRadius:10,background:"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer"}}>↺</div>
                <span style={{fontWeight:700,fontSize:17,color:"#111"}}><WorkoutTimer startTime={startTime}/></span>
                <button onClick={finishWorkout} style={{background:exercises.length?"#22c55e":"#9ca3af",color:"#fff",border:"none",borderRadius:10,padding:"8px 18px",fontWeight:700,fontSize:15,cursor:"pointer"}}>Finish</button>
              </div>
            </div>
            <div style={{padding:"14px 16px 6px"}}>
              <span style={{fontWeight:800,fontSize:22,color:"#111"}}>{workoutName}</span>
              <div style={{display:"flex",gap:14,fontSize:13,color:"#6b7280",marginTop:4}}>
                <span>📅 {dateLabel}</span>
                <span>🕐 <WorkoutTimer startTime={startTime}/></span>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"6px 0 90px"}}>
              {exercises.map(ex=>(
                <div key={ex.id} style={{marginBottom:24,padding:"0 16px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:22}}>{ex.emoji}</span>
                      <span style={{fontWeight:700,color:"#3b82f6",fontSize:16}}>{ex.name}</span>
                    </div>
                    <div style={{display:"flex",background:"#f3f4f6",borderRadius:20,overflow:"hidden"}}>
                      {[{t:"1 min",v:60},{t:"2 min",v:120}].map(r=>(
                        <button key={r.v} onClick={()=>setExercises(p=>p.map(e=>e.id===ex.id?{...e,restTime:r.v}:e))}
                          style={{padding:"4px 10px",border:"none",background:ex.restTime===r.v?"#3b82f6":"transparent",color:ex.restTime===r.v?"#fff":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer",borderRadius:20}}>{r.t}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"44px 1fr 76px 76px 36px",gap:4,marginBottom:4}}>
                    {["Set","Previous","lbs","Reps","✓"].map((h,i)=>(
                      <span key={i} style={{fontWeight:700,fontSize:12,color:"#6b7280",textAlign:i>=2?"center":"left"}}>{h}</span>
                    ))}
                  </div>
                  {ex.sets.map((s,i)=>{
                    const rk=ex.id+"-"+i,showR=restTimers[rk]&&i<ex.sets.length-1;
                    return(
                      <Fragment key={i}>
                        <div style={{display:"grid",gridTemplateColumns:"44px 1fr 76px 76px 36px",gap:4,alignItems:"center",marginBottom:2,opacity:s.locked?0.5:1}}>
                          <div style={{width:32,height:32,borderRadius:8,border:"2px solid #d1d5db",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:"#374151",background:s.done?"#d1fae5":"#fff"}}>{s.type}</div>
                          <span style={{fontSize:12,color:"#9ca3af"}}>{s.prev||"—"}</span>
                          <input type="number" value={s.weight} disabled={s.locked} onChange={e=>updateSet(ex.id,i,"weight",e.target.value)}
                            style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:10,outline:"none",width:"100%",padding:"7px 4px"}}/>
                          <input type="number" value={s.reps} disabled={s.locked} onChange={e=>updateSet(ex.id,i,"reps",e.target.value)}
                            style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:10,outline:"none",width:"100%",padding:"7px 4px"}}/>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <div onClick={()=>toggleDone(ex.id,i)} style={{width:26,height:26,borderRadius:6,background:s.done?"#22c55e":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                              {s.done&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>}
                            </div>
                          </div>
                        </div>
                        {showR&&<RestTimerBar seconds={ex.restTime||120} onDone={()=>setRestTimers(rt=>{const c={...rt};delete c[rk];return c;})}/>}
                        {!showR&&i<ex.sets.length-1&&(
                          <div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
                            <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                            <span style={{fontSize:11,color:"#9ca3af",fontWeight:500}}>{ex.restTime===60?"1:00 rest":"2:00 rest"}</span>
                            <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                          </div>
                        )}
                      </Fragment>
                    );
                  })}
                  <button onClick={()=>addSet(ex.id)} style={{marginTop:8,width:"100%",padding:"12px",background:"#f3f4f6",border:"none",borderRadius:10,color:"#374151",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                    + Add Set ({ex.restTime===60?"1:00":"2:00"})
                  </button>
                </div>
              ))}
              {!showAddPanel&&(
                <div style={{padding:"0 16px"}}>
                  <button onClick={()=>setShowAddPanel(true)} style={{width:"100%",padding:"14px",background:"#fff",border:"2px dashed #d1d5db",borderRadius:12,color:"#6b7280",fontWeight:600,fontSize:15,cursor:"pointer"}}>
                    + Add Exercise
                  </button>
                </div>
              )}
              {showAddPanel&&(
                <div style={{background:"#fff",margin:"0 16px 12px",padding:16,borderRadius:12,border:"1px solid #e5e7eb"}}>
                  <p style={{fontWeight:700,fontSize:15,marginBottom:10,color:"#111"}}>Select Day</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
                    {Object.keys(exerciseLibrary).map(d=>(
                      <button key={d} onClick={()=>setSelectedDay(d)}
                        style={{padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",background:selectedDay===d?"#3b82f6":"#f3f4f6",color:selectedDay===d?"#fff":"#374151",fontWeight:600,fontSize:11}}>{d}</button>
                    ))}
                  </div>
                  {selectedDay&&(
                    <>
                      <p style={{fontWeight:700,fontSize:14,marginBottom:8}}>Select Exercise</p>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {exerciseLibrary[selectedDay].map(ex=>(
                          <button key={ex.name} onClick={()=>addEx(ex)}
                            style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                            <span style={{fontSize:18}}>{ex.emoji}</span>
                            <span style={{fontWeight:600,color:"#1f2937",fontSize:14}}>{ex.name}</span>
                          </button>
                        ))}
                        <button onClick={()=>setShowCustom(true)}
                          style={{padding:"10px 12px",borderRadius:10,border:"1px dashed #d1d5db",background:"#f9fafb",cursor:"pointer",color:"#6b7280",fontWeight:600,fontSize:14}}>+ Custom</button>
                        {showCustom&&(
                          <div style={{display:"flex",gap:8}}>
                            <input value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="Exercise name..."
                              style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,outline:"none"}}/>
                            <button onClick={()=>{if(customName.trim())addEx({name:customName.trim(),emoji:"💪"});}}
                              style={{padding:"8px 14px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Add</button>
                          </div>
                        )}
                      </div>
                    </>
                  )}
                  <button onClick={()=>{setShowAddPanel(false);setSelectedDay("");}}
                    style={{marginTop:12,width:"100%",padding:10,background:"#f3f4f6",border:"none",borderRadius:8,color:"#6b7280",fontWeight:600,cursor:"pointer"}}>Cancel</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ── DETAIL SCREEN ── */
      if(screen==="detail"&&viewWorkout){
        return(
          <div style={{fontFamily:"Inter,sans-serif",background:"#f5f6fa",minHeight:"100vh",maxWidth:390,margin:"0 auto"}}>
            <div style={{background:"#fff",padding:"16px",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
              <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:26,cursor:"pointer",color:"#3b82f6"}}>‹</button>
              <div>
                <div style={{fontWeight:700,fontSize:17}}>{viewWorkout.name}</div>
                <div style={{fontSize:12,color:"#9ca3af"}}>{viewWorkout.date} · {viewWorkout.duration} min</div>
              </div>
            </div>
            <div style={{padding:16}}>
              <div style={{display:"flex",gap:12,marginBottom:16}}>
                {[{label:"Duration",val:viewWorkout.duration+"m"},{label:"Volume (lbs)",val:viewWorkout.volume.toLocaleString()},{label:"Sets",val:viewWorkout.sets}].map(x=>(
                  <div key={x.label} style={{flex:1,background:"#fff",borderRadius:12,padding:14,textAlign:"center",boxShadow:"0 1px 4px #0001"}}>
                    <div style={{fontWeight:700,fontSize:22,color:"#3b82f6"}}>{x.val}</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{x.label}</div>
                  </div>
                ))}
              </div>
              {viewWorkout.exercises.map((ex,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:12,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px #0001"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{ex.emoji}</div>
                    <div style={{fontWeight:700,color:"#3b82f6",fontSize:15}}>{ex.name}</div>
                  </div>
                  {ex.sets.map((s,j)=>(
                    <div key={j} style={{display:"flex",gap:12,padding:"6px 16px",borderTop:"1px solid #f3f4f6",fontSize:13,color:"#374151"}}>
                      <span style={{fontWeight:700,minWidth:24}}>{s.type}</span>
                      <span>{s.weight?s.weight+"lbs":"BW"} × {s.reps||"?"} reps</span>
                      {s.done&&<span style={{marginLeft:"auto",color:"#22c55e"}}>✓</span>}
                    </div>
                  ))}
                </div>
              ))}
              <button onClick={()=>{setWorkouts(prev=>prev.filter(w=>w.id!==viewWorkout.id));setScreen("home");}}
                style={{width:"100%",padding:14,background:"#fee2e2",border:"none",borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",marginTop:8}}>Delete Workout</button>
            </div>
          </div>
        );
      }

      /* ── HOME SCREEN ── */
      return(
        <div style={{fontFamily:"Inter,sans-serif",background:"#fff",minHeight:"100vh",maxWidth:390,margin:"0 auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"20px 20px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:15,color:"#3b82f6",fontWeight:700}}>ZenFit 🏋️</span>
              <span style={{fontSize:22,color:"#6b7280"}}>🔍</span>
            </div>
            <h1 style={{fontSize:30,fontWeight:900,color:"#111",margin:"0 0 16px"}}>Start Workout</h1>
            <div style={{display:"flex",borderBottom:"1px solid #e5e7eb"}}>
              {["start","history"].map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{flex:1,padding:"10px 0",fontWeight:700,fontSize:14,background:"none",border:"none",cursor:"pointer",borderBottom:tab===t?"2px solid #3b82f6":"2px solid transparent",color:tab===t?"#3b82f6":"#9ca3af",textTransform:"capitalize"}}>
                  {t==="start"?"Start":"History"}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
            {tab==="start"&&(
              <>
                <p style={{fontWeight:800,fontSize:16,marginBottom:10,color:"#111"}}>Quick Start</p>
                <button onClick={startEmpty}
                  style={{width:"100%",padding:"16px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:14,fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:24,boxShadow:"0 4px 16px #3b82f640"}}>
                  Start an Empty Workout
                </button>
                <p style={{fontWeight:800,fontSize:16,color:"#111",marginBottom:12}}>Templates</p>
                <p style={{fontWeight:700,fontSize:14,color:"#111",marginBottom:10}}>My Templates ({TEMPLATES.length})</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
                  {TEMPLATES.map(tmpl=>(
                    <button key={tmpl.id} onClick={()=>startFromTemplate(tmpl)}
                      style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,textAlign:"left",cursor:"pointer",boxShadow:"0 1px 4px #0001"}}>
                      <div style={{fontWeight:800,fontSize:13,color:"#111",lineHeight:1.3,marginBottom:6}}>{tmpl.name}</div>
                      <p style={{fontSize:11,color:"#6b7280",margin:0,lineHeight:1.4}}>
                        {tmpl.exercises.slice(0,3).map(e=>e.name).join(", ")}{tmpl.exercises.length>3?" & "+(tmpl.exercises.length-3)+" more...":""}
                      </p>
                    </button>
                  ))}
                </div>
                {workouts.length>0&&(
                  <>
                    <p style={{fontWeight:700,fontSize:14,marginBottom:8,color:"#111"}}>Recent</p>
                    {workouts.slice(0,2).map(w=>(
                      <button key={w.id} onClick={()=>{setViewWorkout(w);setScreen("detail");}}
                        style={{display:"block",width:"100%",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:12,padding:14,marginBottom:8,textAlign:"left",cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontWeight:700,fontSize:14}}>{w.name}</span>
                          <span style={{fontSize:12,color:"#9ca3af"}}>{w.date}</span>
                        </div>
                        <div style={{fontSize:12,color:"#6b7280"}}>⏱ {w.duration} min · 🏋️ {w.exercises.length} exercises · 📦 {w.volume.toLocaleString()} lbs</div>
                      </button>
                    ))}
                  </>
                )}
              </>
            )}
            {tab==="history"&&(
              <>
                {workouts.length===0?(
                  <div style={{textAlign:"center",padding:"60px 0",color:"#9ca3af"}}>
                    <div style={{fontSize:48,marginBottom:12}}>📋</div>
                    <div style={{fontWeight:600,fontSize:15}}>No workouts yet</div>
                  </div>
                ):workouts.map(w=>(
                  <button key={w.id} onClick={()=>{setViewWorkout(w);setScreen("detail");}}
                    style={{display:"block",width:"100%",background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:16,marginBottom:10,textAlign:"left",cursor:"pointer",boxShadow:"0 1px 4px #0001"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:15}}>{w.name}</span>
                      <span style={{fontSize:12,color:"#9ca3af"}}>{w.date}</span>
                    </div>
                    <div style={{display:"flex",gap:16,fontSize:13,color:"#6b7280"}}>
                      <span>⏱ {w.duration} min</span>
                      <span>🏋️ {w.exercises.length} exercises</span>
                      <span>📦 {w.volume.toLocaleString()} lbs</span>
                    </div>
                  </button>
                ))}
              </>
            )}
          </div>
          <div style={{display:"flex",borderTop:"1px solid #e5e7eb",background:"#fff",padding:"8px 0 4px"}}>
            {[{icon:"👤",label:"Profile"},{icon:"🕐",label:"History"},{icon:"➕",label:"Start",main:true}].map(item=>(
              <button key={item.label}
                onClick={()=>item.label==="History"?setTab("history"):item.label==="Start"?setTab("start"):null}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:item.main?"#111":"none",border:"none",borderRadius:item.main?14:0,margin:item.main?"0 4px":0,padding:"8px 4px",cursor:"pointer"}}>
                <span style={{fontSize:item.main?22:18}}>{item.icon}</span>
                <span style={{fontSize:10,color:item.main?"#fff":"#6b7280",fontWeight:600}}>{item.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
