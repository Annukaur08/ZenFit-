    { name: "Single-Arm Lat Pulldown", emoji: "💪" },
    { name: "Single-Leg Romanian DL", emoji: "🏋️" },
    { name: "Single-Arm Cable Chest Press", emoji: "💪" },
    { name: "Lateral Band Walk", emoji: "➡️" }
  ]
};

function RestTimerBar({ seconds, onDone }) {
  const [remaining, setRemaining] = useState(seconds);
  useEffect(() => {
    if (remaining <= 0) { onDone && onDone(); return; }
    const t = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [remaining]);
  const pct = (remaining / seconds) * 100;
  return (
    <div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
      <div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"#3b82f6",transition:"width 1s linear"}} />
      </div>
      <span style={{fontSize:12,color:"#3b82f6",fontWeight:700,minWidth:36}}>
        {Math.floor(remaining/60)}:{String(remaining%60).padStart(2,"0")}
      </span>
    </div>
  );
}

function WorkoutTimer({ startTime }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setElapsed(Math.floor((Date.now()-startTime)/1000)),1000);
    return () => clearInterval(iv);
  }, [startTime]);
  const h = Math.floor(elapsed/3600);
  const m = Math.floor((elapsed%3600)/60);
  const s = elapsed%60;
  return React.createElement("span", null, (h>0?h+":":"") + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0"));
}

  const [customName, setCustomName] = useState("");

  const totalSets = (exs) => exs.reduce((a,ex) => a+ex.sets.length, 0);

  const getPrevious = (exName) => {
    const sorted = [...workouts].sort((a,b) => b.id-a.id);
    for (const w of sorted) {
      const found = w.exercises && w.exercises.find(e => e.name===exName);
      if (found) {
        const valid = found.sets.filter(s => s.weight && s.reps);
        if (valid.length > 0) {
          const best = [...valid].sort((a,b) => (parseFloat(b.weight)*parseInt(b.reps))-(parseFloat(a.weight)*parseInt(a.reps)))[0];
          return best.weight+"lb x "+best.reps;
        }
      }
    }
    return "";
  };

    setStartTime(Date.now());
    setWorkoutName(tmpl.name);
    setExercises(tmpl.exercises.map((ex,ei) => ({
      id: Date.now()+ei,
      name: ex.name,
      emoji: ex.emoji,
      note: "",
      restTime: 120,
      sets: ex.sets.map(s => ({...s, prev: getPrevious(ex.name)}))
    })));
    setRestTimers({});
    setShowAddPanel(false);
    setScreen("workout");

  const startEmpty = () => {

    setExercises([]);
    setRestTimers({});
    setShowAddPanel(false);
    setScreen("workout");
  };

  const addExerciseToWorkout = (exObj) => {
    setExercises(p => [...p, {
      id: Date.now(),
      name: exObj.name,
      emoji: exObj.emoji || "💪",
      note: "",
      restTime: 120,
      sets: [{type:"1", prev:getPrevious(exObj.name), weight:"", reps:"", done:false}]
    }]);
    setShowAddPanel(false);
    setSelectedDay("");
    setCustomName("");
    setRepoCategory("");
    setRepoSearch("");
    setAddMode("day");
  };

  const updateSet = (exId, setIdx, field, val) => {
    setExercises(prev => prev.map(ex =>
      ex.id===exId ? {...ex, sets: ex.sets.map((s,i) => i===setIdx ? {...s,[field]:val} : s)} : ex
    ));
  };

  const toggleDone = (exId, setIdx) => {
    setExercises(prev => prev.map(ex => {
      if (ex.id!==exId) return ex;
      const newDone = !ex.sets[setIdx].done;
      const newSets = ex.sets.map((s,i) => i===setIdx ? {...s,done:newDone} : s);
      if (newDone) setRestTimers(rt => ({...rt,[exId+"-"+setIdx]:true}));
      else setRestTimers(rt => { const c={...rt}; delete c[exId+"-"+setIdx]; return c; });
      return {...ex, sets:newSets};
    }));
  };

  const addSet = (exId) => {
    setExercises(prev => prev.map(ex => {
      if (ex.id!==exId) return ex;
      const num = ex.sets.length+1;
      return {...ex, sets:[...ex.sets, {type:String(num), prev:getPrevious(ex.name), weight:"", reps:"", done:false}]};
    }));
