function RestTimerBar({ seconds, onDone }) {
  const [remaining, setRemaining] = React.useState(seconds);
  React.useEffect(() => {
    if (remaining <= 0) { onDone && onDone(); return; }
    const t = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [remaining]);
  const pct = (remaining / seconds) * 100;
  return (
    <div style={{ display:"flex", alignItems:"center", padding:"4px 0", gap:8, margin:"4px 0" }}>
      <div style={{ flex:1, height:3, background:"#e5e7eb", borderRadius:2, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:"#3b82f6", transition:"width 1s linear" }} />
      </div>
      <span style={{ fontSize:12, color:"#3b82f6", fontWeight:700, minWidth:40 }}>
        {Math.floor(remaining/60)}:{String(remaining%60).padStart(2,"0")}
      </span>
    </div>
  );
}

function WorkoutTimer({ startTime }) {
  const [elapsed, setElapsed] = React.useState(0);
  React.useEffect(() => {
    const interval = setInterval(() => setElapsed(Math.floor((Date.now()-startTime)/1000)), 1000);
    return () => clearInterval(interval);
  }, [startTime]);
  const h = Math.floor(elapsed/3600);
  const m = Math.floor((elapsed%3600)/60);
  const s = elapsed%60;
  return <span>{h>0?`${h}:`:"" }{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;
}

        if (valid.length>0) {
