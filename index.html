function RestTimerBar({seconds,onDone}){
  const[rem,setRem]=useState(seconds);
  useEffect(()=>{if(rem<=0){onDone&&onDone();return;}const t=setTimeout(()=>setRem(r=>r-1),1000);return()=>clearTimeout(t);},[rem]);
  const pct=(rem/seconds)*100;
  return(
    <div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
      <div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"#3b82f6",transition:"width 1s linear"}}/>
      </div>
      <span style={{fontSize:12,color:"#3b82f6",fontWeight:700,minWidth:36}}>{Math.floor(rem/60)}:{String(rem%60).padStart(2,"0")}</span>
    </div>
  );
}

function WorkoutTimer({startTime}){
  const[el,setEl]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setEl(Math.floor((Date.now()-startTime)/1000)),1000);return()=>clearInterval(iv);},[startTime]);
  const h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
  return <span>{h>0?h+":":""}{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;
}

function App(){
  const[screen,setScreen]=useState("home");
  const[workouts,setWorkouts]=useState(()=>loadWorkouts());
  const[viewWorkout,setViewWorkout]=useState(null);
  const[tab,setTab]=useState("start");
  const[workoutName,setWorkoutName]=useState("");
  const[exercises,setExercises]=useState([]);
  const[startTime,setStartTime]=useState(null);
  const[restTimers,setRestTimers]=useState({});
  const[showAddPanel,setShowAddPanel]=useState(false);
  const[selectedDay,setSelectedDay]=useState("");
  const[customName,setCustomName]=useState("");
  const[repoCategory,setRepoCategory]=useState("");
  const[repoSearch,setRepoSearch]=useState("");
  const[addMode,setAddMode]=useState("day");
  const[showFinishDialog,setShowFinishDialog]=useState(false);

  const dateLabel=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const totalVol=(exs)=>exs.reduce((a,ex)=>a+ex.sets.reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0);
  const totalSets=(exs)=>exs.reduce((a,ex)=>a+ex.sets.length,0);

  const getPrev=(exName)=>{
    for(const w of [...workouts].sort((a,b)=>b.id-a.id)){
      const f=w.exercises?.find(e=>e.name===exName);
      if(f){const v=f.sets.filter(s=>s.weight&&s.reps);if(v.length){const best=[...v].sort((a,b)=>(parseFloat(b.weight)*parseInt(b.reps))-(parseFloat(a.weight)*parseInt(a.reps)))[0];return best.weight+"lb x "+best.reps;}}
    }
    return "";
  };

  const startFromTemplate=(tmpl)=>{
    setStartTime(Date.now());setWorkoutName(tmpl.name);
    setExercises(tmpl.exercises.map((ex,i)=>({id:Date.now()+i,name:ex.name,emoji:exerciseEmoji[ex.name]||ex.emoji,note:"",restTime:120,sets:ex.sets.map(s=>({...s,prev:getPrev(ex.name)}))})));
    setRestTimers({});setShowAddPanel(false);setScreen("workout");
  };
  const startEmpty=()=>{setStartTime(Date.now());setWorkoutName("My Workout");setExercises([]);setRestTimers({});setShowAddPanel(false);setScreen("workout");};

  const addExerciseToWorkout=(exObj)=>{
    const prev=getPrev(exObj.name);
    setExercises(p=>[...p,{id:Date.now(),name:exObj.name,emoji:exerciseEmoji[exObj.name]||exObj.emoji||"\U0001f4aa",note:"",restTime:120,sets:[{type:"1",prev,weight:"",reps:"",done:false,locked:false}]}]);
    setShowAddPanel(false);setSelectedDay("");setCustomName("");setRepoCategory("");setRepoSearch("");setAddMode("day");
  };

  const updateSet=(exId,si,field,val)=>setExercises(prev=>prev.map(ex=>ex.id===exId?{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,[field]:val}:s)}:ex));

  const toggleDone=(exId,si)=>setExercises(prev=>prev.map(ex=>{
    if(ex.id!==exId||ex.sets[si]?.locked)return ex;
    const nd=!ex.sets[si].done;
    if(nd)setRestTimers(rt=>({...rt,[exId+"-"+si]:true}));
    else setRestTimers(rt=>{const c={...rt};delete c[exId+"-"+si];return c;});
    return{...ex,sets:ex.sets.map((s,i)=>i===si?{...s,done:nd}:s)};
  }));

  const addSet=(exId)=>setExercises(prev=>prev.map(ex=>{
    if(ex.id!==exId)return ex;
    return{...ex,sets:[...ex.sets,{type:String(ex.sets.length+1),prev:getPrev(ex.name),weight:"",reps:"",done:false,locked:false}]};
  }));

  const finishAndSave=()=>{
    if(!exercises.length)return;
    const dur=Math.round((Date.now()-startTime)/60000);
    const w={id:Date.now(),name:workoutName,date:dateLabel,duration:dur,exercises,volume:totalVol(exercises),sets:totalSets(exercises)};
    setWorkouts(prev=>{const u=[w,...prev];saveWorkouts(u);return u;});
    setShowFinishDialog(false);setScreen("home");
  };
  const cancelWorkout=()=>{setShowFinishDialog(false);setScreen("home");};

  /* ── FINISH DIALOG ── */
  const FinishDialog=()=>(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24}}>
      <div style={{background:"#fff",borderRadius:22,padding:28,width:"100%",maxWidth:320,boxShadow:"0 12px 48px #0004"}}>
        <div style={{fontSize:38,textAlign:"center",marginBottom:8}}>\U0001f3c1</div>
        <h2 style={{fontWeight:900,fontSize:20,color:"#111",textAlign:"center",marginBottom:6}}>Finish Workout?</h2>
        <p style={{fontSize:13,color:"#6b7280",textAlign:"center",marginBottom:22}}>
          {exercises.length} exercise{exercises.length!==1?"s":""} \u00b7 {totalSets(exercises)} sets \u00b7 {totalVol(exercises).toLocaleString()} lbs
        </p>
        <button onClick={finishAndSave}
          style={{width:"100%",padding:"14px",background:"#22c55e",color:"#fff",border:"none",borderRadius:13,fontWeight:800,fontSize:16,cursor:"pointer",marginBottom:10}}>
          \u2705 Save Workout
        </button>
        <button onClick={cancelWorkout}
          style={{width:"100%",padding:"14px",background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:13,fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>
          \U0001f5d1\ufe0f Discard & Exit
        </button>
        <button onClick={()=>setShowFinishDialog(false)}
          style={{width:"100%",padding:"12px",background:"#f3f4f6",color:"#6b7280",border:"none",borderRadius:13,fontWeight:600,fontSize:14,cursor:"pointer"}}>
          Keep Training
        </button>
      </div>
    </div>
  );

  /* ── ADD EXERCISE PANEL ── */
  const AddPanel=()=>(
    <div style={{background:"#fff",margin:"0 16px 12px",padding:16,borderRadius:14,border:"1px solid #e5e7eb",boxShadow:"0 2px 8px #0001"}}>
      <p style={{fontWeight:800,fontSize:15,marginBottom:12,color:"#111"}}>Add Exercise</p>
      {/* Mode tabs */}
      <div style={{display:"flex",background:"#f3f4f6",borderRadius:12,padding:3,marginBottom:14,gap:3}}>
        {[{k:"day",label:"\U0001f4cb My Days"},{k:"repo",label:"\U0001f3db\ufe0f Library"},{k:"custom",label:"\u270f\ufe0f Custom"}].map(m=>(
          <button key={m.k} onClick={()=>{setAddMode(m.k);setSelectedDay("");setRepoCategory("");setRepoSearch("");}}
            style={{flex:1,padding:"7px 4px",border:"none",borderRadius:10,background:addMode===m.k?"#fff":"transparent",color:addMode===m.k?"#111":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer",boxShadow:addMode===m.k?"0 1px 4px #0001":"none"}}>
            {m.label}
          </button>
        ))}
      </div>

      {/* My Days */}
      {addMode==="day"&&(
        <>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
            {Object.keys(exerciseLibrary).map(d=>(
              <button key={d} onClick={()=>setSelectedDay(d)}
                style={{padding:"6px 11px",borderRadius:20,border:"none",cursor:"pointer",background:selectedDay===d?"#3b82f6":"#f3f4f6",color:selectedDay===d?"#fff":"#374151",fontWeight:600,fontSize:11}}>{d}</button>
            ))}
          </div>
          {selectedDay&&(
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflowY:"auto"}}>
              {exerciseLibrary[selectedDay].map(ex=>(
                <button key={ex.name} onClick={()=>addExerciseToWorkout(ex)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:18}}>{ex.emoji}</span>
                  <span style={{fontWeight:600,color:"#1f2937",fontSize:14}}>{ex.name}</span>
                </button>
              ))}
            </div>
          )}
        </>
      )}

      {/* Library / Repository */}
      {addMode==="repo"&&(
        <>
          <input value={repoSearch} onChange={e=>setRepoSearch(e.target.value)}
            placeholder="\U0001f50d Search 120+ exercises..."
            style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}}
          />
          {!repoSearch&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {Object.keys(EXERCISE_REPO).map(cat=>(
                <button key={cat} onClick={()=>setRepoCategory(repoCategory===cat?"":cat)}
                  style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",background:repoCategory===cat?"#3b82f6":"#f3f4f6",color:repoCategory===cat?"#fff":"#374151",fontWeight:600,fontSize:10}}>{cat}</button>
              ))}
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
            {(()=>{
              let entries=[];
              if(repoSearch.trim()){
                Object.values(EXERCISE_REPO).forEach(list=>list.forEach(ex=>{if(ex.name.toLowerCase().includes(repoSearch.toLowerCase()))entries.push(ex);}));
              } else {
                const cats=repoCategory?[repoCategory]:Object.keys(EXERCISE_REPO);
                cats.forEach(cat=>EXERCISE_REPO[cat].forEach(ex=>entries.push({...ex,_cat:cat})));
              }
              if(!entries.length)return <p style={{color:"#9ca3af",fontSize:13,textAlign:"center",padding:16}}>No results found</p>;
              return entries.map((ex,i)=>(
                <button key={i} onClick={()=>addExerciseToWorkout(ex)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:18}}>{ex.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,color:"#1f2937",fontSize:13}}>{ex.name}</div>
                    <div style={{fontSize:10,color:ex.type==="Bodyweight"?"#10b981":ex.type==="Cardio"?"#f59e0b":"#6b7280",fontWeight:600}}>
                      {ex.type}{ex._cat?" \u00b7 "+ex._cat:""}
                    </div>
                  </div>
                </button>
              ));
            })()}
          </div>
        </>
      )}

      {/* Custom */}
      {addMode==="custom"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{fontSize:13,color:"#6b7280"}}>Type any exercise name:</p>
          <input value={customName} onChange={e=>setCustomName(e.target.value)}
            placeholder="e.g. Resistance Band Row..."
            onKeyDown={e=>{if(e.key==="Enter"&&customName.trim())addExerciseToWorkout({name:customName.trim(),emoji:"\U0001f4aa"});}}
            style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none"}}
          />
          <button onClick={()=>{if(customName.trim())addExerciseToWorkout({name:customName.trim(),emoji:"\U0001f4aa"});}}
            disabled={!customName.trim()}
            style={{width:"100%",padding:"12px",background:customName.trim()?"#3b82f6":"#d1d5db",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:customName.trim()?"pointer":"not-allowed"}}>
            + Add {customName?'"'+customName+'"':"Exercise"}
          </button>
        </div>
      )}

      <button onClick={()=>{setShowAddPanel(false);setSelectedDay("");setRepoCategory("");setRepoSearch("");setAddMode("day");}}
        style={{marginTop:12,width:"100%",padding:10,background:"#f3f4f6",border:"none",borderRadius:8,color:"#6b7280",fontWeight:600,cursor:"pointer",fontSize:13}}>
        Cancel
      </button>
    </div>
  );

  /* ── WORKOUT SCREEN ── */
  if(screen==="workout"){
    return(
      <div style={{fontFamily:"Inter,sans-serif",background:"#fff",minHeight:"100vh",maxWidth:390,margin:"0 auto",display:"flex",flexDirection:"column"}}>
        {showFinishDialog&&<FinishDialog/>}
        <div style={{background:"#fff",padding:"14px 16px 10px",borderBottom:"1px solid #f0f0f0",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div onClick={()=>setScreen("home")} style={{width:40,height:40,borderRadius:10,background:"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer"}}>\u21ba</div>
            <span style={{fontWeight:700,fontSize:17,color:"#111"}}><WorkoutTimer startTime={startTime}/></span>
            <button onClick={()=>setShowFinishDialog(true)} style={{background:exercises.length?"#22c55e":"#9ca3af",color:"#fff",border:"none",borderRadius:10,padding:"8px 18px",fontWeight:700,fontSize:15,cursor:"pointer"}}>Finish</button>
          </div>
        </div>
        <div style={{padding:"14px 16px 6px"}}>
          <span style={{fontWeight:800,fontSize:22,color:"#111"}}>{workoutName}</span>
          <div style={{display:"flex",gap:14,fontSize:13,color:"#6b7280",marginTop:4}}>
            <span>\U0001f4c5 {dateLabel}</span>
            <span>\U0001f550 <WorkoutTimer startTime={startTime}/></span>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"6px 0 90px"}}>
          {exercises.map(ex=>(
            <div key={ex.id} style={{marginBottom:24,padding:"0 16px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:22}}>{ex.emoji}</span>
                  <span style={{fontWeight:700,color:"#3b82f6",fontSize:16}}>{ex.name}</span>
                </div>
                <div style={{display:"flex",background:"#f3f4f6",borderRadius:20,overflow:"hidden"}}>
                  {[{t:"1 min",v:60},{t:"2 min",v:120}].map(r=>(
                    <button key={r.v} onClick={()=>setExercises(p=>p.map(e=>e.id===ex.id?{...e,restTime:r.v}:e))}
                      style={{padding:"4px 10px",border:"none",background:ex.restTime===r.v?"#3b82f6":"transparent",color:ex.restTime===r.v?"#fff":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer",borderRadius:20}}>{r.t}</button>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"44px 1fr 76px 76px 36px",gap:4,marginBottom:4}}>
                {["Set","Previous","lbs","Reps","\u2713"].map((h,i)=>(
                  <span key={i} style={{fontWeight:700,fontSize:12,color:"#6b7280",textAlign:i>=2?"center":"left"}}>{h}</span>
                ))}
              </div>
              {ex.sets.map((s,i)=>{
                const rk=ex.id+"-"+i,showR=restTimers[rk]&&i<ex.sets.length-1;
                return(
                  <Fragment key={i}>
                    <div style={{display:"grid",gridTemplateColumns:"44px 1fr 76px 76px 36px",gap:4,alignItems:"center",marginBottom:2,opacity:s.locked?0.5:1}}>
                      <div style={{width:32,height:32,borderRadius:8,border:"2px solid #d1d5db",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:"#374151",background:s.done?"#d1fae5":"#fff"}}>{s.type}</div>
                      <span style={{fontSize:12,color:"#9ca3af"}}>{s.prev||"\u2014"}</span>
                      <input type="number" value={s.weight} disabled={s.locked} onChange={e=>updateSet(ex.id,i,"weight",e.target.value)}
                        style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:10,outline:"none",width:"100%",padding:"7px 4px"}}/>
                      <input type="number" value={s.reps} disabled={s.locked} onChange={e=>updateSet(ex.id,i,"reps",e.target.value)}
                        style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:10,outline:"none",width:"100%",padding:"7px 4px"}}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <div onClick={()=>toggleDone(ex.id,i)} style={{width:26,height:26,borderRadius:6,background:s.done?"#22c55e":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                          {s.done&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>\u2713</span>}
                        </div>
                      </div>
                    </div>
                    {showR&&<RestTimerBar seconds={ex.restTime||120} onDone={()=>setRestTimers(rt=>{const c={...rt};delete c[rk];return c;})}/>}
                    {!showR&&i<ex.sets.length-1&&(
                      <div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
                        <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                        <span style={{fontSize:11,color:"#9ca3af",fontWeight:500}}>{ex.restTime===60?"1:00 rest":"2:00 rest"}</span>
                        <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                      </div>
                    )}
                  </Fragment>
                );
              })}
              <button onClick={()=>addSet(ex.id)} style={{marginTop:8,width:"100%",padding:"12px",background:"#f3f4f6",border:"none",borderRadius:10,color:"#374151",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                + Add Set ({ex.restTime===60?"1:00":"2:00"})
              </button>
            </div>
          ))}
          {!showAddPanel&&(
            <div style={{padding:"0 16px"}}>
              <button onClick={()=>setShowAddPanel(true)} style={{width:"100%",padding:"14px",background:"#fff",border:"2px dashed #d1d5db",borderRadius:12,color:"#6b7280",fontWeight:600,fontSize:15,cursor:"pointer"}}>
                + Add Exercise
              </button>
            </div>
          )}
          {showAddPanel&&<AddPanel/>}
        </div>
      </div>
    );
  }

  /* ── DETAIL SCREEN ── */
  if(screen==="detail"&&viewWorkout){
    return(
      <div style={{fontFamily:"Inter,sans-serif",background:"#f5f6fa",minHeight:"100vh",maxWidth:390,margin:"0 auto"}}>
        <div style={{background:"#fff",padding:"16px",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:26,cursor:"pointer",color:"#3b82f6"}}>\u2039</button>
          <div>
            <div style={{fontWeight:700,fontSize:17}}>{viewWorkout.name}</div>
            <div style={{fontSize:12,color:"#9ca3af"}}>{viewWorkout.date} \u00b7 {viewWorkout.duration} min</div>
          </div>
        </div>
        <div style={{padding:16}}>
          <div style={{display:"flex",gap:12,marginBottom:16}}>
            {[{label:"Duration",val:viewWorkout.duration+"m"},{label:"Volume (lbs)",val:viewWorkout.volume.toLocaleString()},{label:"Sets",val:viewWorkout.sets}].map(x=>(
              <div key={x.label} style={{flex:1,background:"#fff",borderRadius:12,padding:14,textAlign:"center",boxShadow:"0 1px 4px #0001"}}>
                <div style={{fontWeight:700,fontSize:22,color:"#3b82f6"}}>{x.val}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{x.label}</div>
              </div>
            ))}
          </div>
          {viewWorkout.exercises.map((ex,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:12,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px #0001"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px"}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{ex.emoji}</div>
                <div style={{fontWeight:700,color:"#3b82f6",fontSize:15}}>{ex.name}</div>
              </div>
              {ex.sets.map((s,j)=>(
                <div key={j} style={{display:"flex",gap:12,padding:"6px 16px",borderTop:"1px solid #f3f4f6",fontSize:13,color:"#374151"}}>
                  <span style={{fontWeight:700,minWidth:24}}>{s.type}</span>
                  <span>{s.weight?s.weight+"lbs":"BW"} \u00d7 {s.reps||"?"} reps</span>
                  {s.done&&<span style={{marginLeft:"auto",color:"#22c55e"}}>\u2713</span>}
                </div>
              ))}
            </div>
          ))}
          <button onClick={()=>{setWorkouts(prev=>prev.filter(w=>w.id!==viewWorkout.id));setScreen("home");}}
            style={{width:"100%",padding:14,background:"#fee2e2",border:"none",borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",marginTop:8}}>Delete Workout</button>
        </div>
      </div>
    );
  }

  /* ── HOME SCREEN ── */
  return(
    <div style={{fontFamily:"Inter,sans-serif",background:"#fff",minHeight:"100vh",maxWidth:390,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:15,color:"#3b82f6",fontWeight:800}}>ZenFit \U0001f3cb\ufe0f</span>
          <span style={{fontSize:22,color:"#6b7280"}}>\U0001f50d</span>
        </div>
        <h1 style={{fontSize:30,fontWeight:900,color:"#111",margin:"0 0 16px"}}>Start Workout</h1>
        <div style={{display:"flex",borderBottom:"1px solid #e5e7eb"}}>
          {["start","history"].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{flex:1,padding:"10px 0",fontWeight:700,fontSize:14,background:"none",border:"none",cursor:"pointer",borderBottom:tab===t?"2px solid #3b82f6":"2px solid transparent",color:tab===t?"#3b82f6":"#9ca3af",textTransform:"capitalize"}}>
              {t==="start"?"Start":"History"}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
        {tab==="start"&&(
          <>
            <p style={{fontWeight:800,fontSize:16,marginBottom:10,color:"#111"}}>Quick Start</p>
            <button onClick={startEmpty}
              style={{width:"100%",padding:"16px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:14,fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:24,boxShadow:"0 4px 16px #3b82f640"}}>
              Start an Empty Workout
            </button>
            <p style={{fontWeight:800,fontSize:16,color:"#111",marginBottom:10}}>My Templates ({TEMPLATES.length})</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
              {TEMPLATES.map(tmpl=>(
                <button key={tmpl.id} onClick={()=>startFromTemplate(tmpl)}
                  style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,textAlign:"left",cursor:"pointer",boxShadow:"0 1px 4px #0001"}}>
                  <div style={{fontWeight:800,fontSize:13,color:"#111",lineHeight:1.3,marginBottom:6}}>{tmpl.name}</div>
                  <p style={{fontSize:11,color:"#6b7280",margin:0,lineHeight:1.4}}>
                    {tmpl.exercises.slice(0,3).map(e=>e.name).join(", ")}{tmpl.exercises.length>3?" & "+(tmpl.exercises.length-3)+" more...":""}
                  </p>
                </button>
