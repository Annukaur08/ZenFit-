function RestTimer({ seconds, onDone }) {
  const [rem, setRem] = useState(seconds);
  useEffect(() => {
    if (rem <= 0) { onDone && onDone(); return; }
    const t = setTimeout(() => setRem(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [rem]);
  const pct = (rem / seconds) * 100;
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#eff6ff",borderRadius:10,margin:"4px 0"}}>
      <div style={{width:36,height:36,borderRadius:"50%",background:"conic-gradient(#3b82f6 "+pct+"%,#e5e7eb "+pct+"%)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:28,height:28,borderRadius:"50%",background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#3b82f6"}}>
          {Math.floor(rem/60)}:{String(rem%60).padStart(2,"0")}
        </div>
      </div>
      <span style={{fontSize:13,color:"#3b82f6",fontWeight:600}}>Rest timer</span>
    </div>
  );
}

function WTimer({ start }) {
  const [el, setEl] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setEl(Math.floor((Date.now()-start)/1000)), 1000);
    return () => clearInterval(iv);
  }, [start]);
  const h=Math.floor(el/3600), m=Math.floor((el%3600)/60), s=el%60;
  return React.createElement("span", null, (h>0?h+":":"") + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0"));
}

        const v = f.sets.filter(s=>s.w&&s.r);
        if (v.length) {
          const best = [...v].sort((a,b)=>(parseFloat(b.w)*parseInt(b.r))-(parseFloat(a.w)*parseInt(a.r)))[0];
          return best.w+"lb x "+best.r;
        }
      }
    }
    return "";
  };

  const startTmpl = (tmpl) => {
    setStartT(Date.now()); setWName(tmpl.name);
    setExs(tmpl.exercises.map((e,i)=>({id:Date.now()+i,name:e.name,emoji:e.emoji,restT:120,sets:e.sets.map(s=>({...s,prev:getPrev(e.name)}))})));
    setTimers({}); setShowAdd(false); setScreen("workout");
  };

  const startEmpty = () => {
    setStartT(Date.now()); setWName("My Workout"); setExs([]); setTimers({}); setShowAdd(false); setScreen("workout");
  };

  const addEx = (exObj) => {
    setExs(p=>[...p,{id:Date.now(),name:exObj.name,emoji:exObj.emoji||"💪",restT:120,sets:[{type:"1",prev:getPrev(exObj.name),w:"",r:"",done:false}]}]);
    setShowAdd(false); setSelDay(""); setCustomN(""); setRepoCat(""); setRepoQ(""); setAddMode("day");
  };

  const updSet = (eid,si,f,v) => setExs(p=>p.map(e=>e.id===eid?{...e,sets:e.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:e));

  const togDone = (eid,si) => setExs(p=>p.map(e=>{
    if(e.id!==eid) return e;
    const nd=!e.sets[si].done;
    const ns=e.sets.map((s,i)=>i===si?{...s,done:nd}:s);
    if(nd) setTimers(t=>({...t,[eid+"-"+si]:true}));
    else setTimers(t=>{const c={...t};delete c[eid+"-"+si];return c;});
    return {...e,sets:ns};
  }));

  const addSet = (eid) => setExs(p=>p.map(e=>{
    if(e.id!==eid) return e;
    return {...e,sets:[...e.sets,{type:String(e.sets.length+1),prev:getPrev(e.name),w:"",r:"",done:false}]};
  }));

  const saveW = () => {
    if(!exs.length) return;
    const dur=Math.round((Date.now()-startT)/60000);
    const w={id:Date.now(),name:wName,date:dateLabel,dur,exs,vol:vol(exs),sets:setCount(exs)};
    setWorkouts(p=>{const u=[w,...p];saveWorkouts(u);return u;});
    setShowFinish(false); setScreen("home");
  };

  const discardW = () => {setShowFinish(false); setScreen("home");};

  if (screen==="workout") return (
    <div style={{paddingBottom:40}}>
      {showFinish && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🏁</div>
            <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>Finish Workout?</div>
            <div style={{color:"#6b7280",fontSize:14,marginBottom:20}}>{exs.length} exercise{exs.length!==1?"s":""} · {setCount(exs)} sets · {vol(exs).toLocaleString()} lbs</div>
            <button onClick={saveW} style={{width:"100%",padding:14,background:"#22c55e",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:8}}>Save Workout</button>
            <button onClick={discardW} style={{width:"100%",padding:12,background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer",marginBottom:8}}>Discard and Exit</button>
            <button onClick={()=>setShowFinish(false)} style={{width:"100%",padding:12,background:"#f3f4f6",color:"#6b7280",border:"none",borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer"}}>Keep Training</button>
          </div>
        </div>
      )}
      <div style={{position:"sticky",top:0,zIndex:10,background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#3b82f6"}}>&#8617;</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:800,fontSize:16}}>{wName}</div>
          <div style={{fontSize:12,color:"#6b7280"}}>{startT && <WTimer start={startT}/>}</div>
        </div>
        <button onClick={()=>setShowFinish(true)} style={{background:exs.length?"#22c55e":"#9ca3af",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Finish</button>
      </div>
      <div style={{padding:"12px 16px"}}>
        <div style={{fontSize:13,color:"#9ca3af",marginBottom:12}}>📅 {dateLabel}</div>
        {exs.map(ex=>(
          <div key={ex.id} style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:16}}>{ex.emoji} {ex.name}</div>
              <div style={{display:"flex",gap:4}}>
                {[60,120].map(rt=>(
                  <button key={rt} onClick={()=>setExs(p=>p.map(e=>e.id===ex.id?{...e,restT:rt}:e))}
                    style={{padding:"4px 10px",border:"none",borderRadius:8,background:ex.restT===rt?"#3b82f6":"#f3f4f6",color:ex.restT===rt?"#fff":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                    {rt===60?"1 min":"2 min"}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"40px 1fr 70px 70px 36px",gap:4,marginBottom:4}}>
              {["Set","Previous","lbs","Reps","✓"].map(h=>(
                <div key={h} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#9ca3af"}}>{h}</div>
              ))}
            </div>
            {ex.sets.map((s,i)=>{
              const rk=ex.id+"-"+i;
              return (
                <div key={i}>
                  <div style={{display:"grid",gridTemplateColumns:"40px 1fr 70px 70px 36px",gap:4,alignItems:"center",marginBottom:2}}>
                    <div style={{textAlign:"center",fontWeight:700,fontSize:13,color:"#6b7280"}}>{s.type}</div>
                    <div style={{textAlign:"center",fontSize:11,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.prev||"—"}</div>
                    <input value={s.w} onChange={e=>updSet(ex.id,i,"w",e.target.value)} inputMode="decimal" placeholder="0"
                      style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}}/>
                    <input value={s.r} onChange={e=>updSet(ex.id,i,"r",e.target.value)} inputMode="numeric" placeholder="0"
                      style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}}/>
                    <div onClick={()=>togDone(ex.id,i)}
                      style={{width:26,height:26,borderRadius:6,background:s.done?"#22c55e":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto",color:"#fff",fontSize:14,fontWeight:700}}>
                      {s.done&&"✓"}
                    </div>
                  </div>
                  {timers[rk]&&<RestTimer seconds={ex.restT} onDone={()=>setTimers(t=>{const c={...t};delete c[rk];return c;})}/>}
                  {!timers[rk]&&i<ex.sets.length-1&&<div style={{textAlign:"center",fontSize:11,color:"#d1d5db",padding:"2px 0"}}>{ex.restT===60?"1:00":"2:00"} rest</div>}
                </div>
              );
            })}
            <button onClick={()=>addSet(ex.id)} style={{marginTop:8,width:"100%",padding:"10px",background:"#f3f4f6",border:"none",borderRadius:10,color:"#374151",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Add Set</button>
          </div>
        ))}
        {!showAdd&&<button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:14,background:"#fff",border:"2px dashed #d1d5db",borderRadius:12,color:"#6b7280",fontWeight:600,fontSize:15,cursor:"pointer"}}>+ Add Exercise</button>}
        {showAdd&&(
          <div style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>Add Exercise</div>
            <div style={{display:"flex",background:"#f3f4f6",borderRadius:12,padding:4,marginBottom:14,gap:4}}>
              {[{k:"day",label:"📋 My Days"},{k:"repo",label:"🏛️ Library"},{k:"custom",label:"✏️ Custom"}].map(m=>(
                <button key={m.k} onClick={()=>{setAddMode(m.k);setSelDay("");setRepoCat("");setRepoQ("");}}
                  style={{flex:1,padding:"7px 4px",border:"none",borderRadius:10,background:addMode===m.k?"#fff":"transparent",color:addMode===m.k?"#111":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer",boxShadow:addMode===m.k?"0 1px 4px rgba(0,0,0,0.06)":"none"}}>
                  {m.label}
                </button>
              ))}
            </div>
            {addMode==="day"&&(
              <div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                  {Object.keys(DAY_LIBRARY).map(d=>(
                    <button key={d} onClick={()=>setSelDay(d)}
                      style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",background:selDay===d?"#3b82f6":"#f3f4f6",color:selDay===d?"#fff":"#374151",fontWeight:600,fontSize:11}}>
                      {d}
                    </button>
                  ))}
                </div>
                {selDay&&(
                  <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
                    {DAY_LIBRARY[selDay].map(e=>(
                      <button key={e.name} onClick={()=>addEx(e)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                        <span>{e.emoji}</span><span style={{fontWeight:600,fontSize:14}}>{e.name}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
            {addMode==="repo"&&(
              <div>
                <input value={repoQ} onChange={e=>setRepoQ(e.target.value)} placeholder="Search exercises..."
                  style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}}/>
                {!repoQ&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                    {Object.keys(EXERCISE_REPO).map(cat=>(
                      <button key={cat} onClick={()=>setRepoCat(repoCat===cat?"":cat)}
                        style={{padding:"4px 9px",borderRadius:20,border:"none",cursor:"pointer",background:repoCat===cat?"#3b82f6":"#f3f4f6",color:repoCat===cat?"#fff":"#374151",fontWeight:600,fontSize:10}}>
                        {cat}
                      </button>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
                  {(()=>{
                    let entries=[];
                    if(repoQ.trim()){Object.entries(EXERCISE_REPO).forEach(([cat,list])=>list.forEach(e=>{if(e.name.toLowerCase().includes(repoQ.toLowerCase()))entries.push({...e,_cat:cat});}));}
                    else{const cats=repoCat?[repoCat]:Object.keys(EXERCISE_REPO);cats.forEach(cat=>EXERCISE_REPO[cat].forEach(e=>entries.push({...e,_cat:cat})));}
                    return entries.map((e,i)=>(
                      <button key={i} onClick={()=>addEx(e)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                        <span>{e.emoji}</span>
                        <div><div style={{fontWeight:600,fontSize:14}}>{e.name}</div><div style={{fontSize:11,color:"#9ca3af"}}>{e.type} · {e._cat}</div></div>
                      </button>
                    ));
                  })()}
                </div>
              </div>
            )}
            {addMode==="custom"&&(
              <div>
                <div style={{fontSize:13,color:"#6b7280",marginBottom:8}}>Type any exercise name:</div>
                <input value={customN} onChange={e=>setCustomN(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&customN.trim())addEx({name:customN.trim(),emoji:"💪"});}}
                  placeholder="e.g. Cable Glute Kickback..."
                  style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}}/>
                <button onClick={()=>customN.trim()&&addEx({name:customN.trim(),emoji:"💪"})} disabled={!customN.trim()}
                  style={{width:"100%",padding:12,background:customN.trim()?"#3b82f6":"#d1d5db",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:customN.trim()?"pointer":"not-allowed"}}>
                  + Add "{customN||"Exercise"}"
                </button>
              </div>
            )}
            <button onClick={()=>{setShowAdd(false);setSelDay("");setAddMode("day");setRepoCat("");setRepoQ("");}}
              style={{marginTop:12,width:"100%",padding:10,background:"#f3f4f6",border:"none",borderRadius:8,color:"#6b7280",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          </div>
        )}
      </div>
    </div>
  );

  if (screen==="detail"&&viewW) return (
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#3b82f6"}}>&#8249;</button>
        <div>
          <div style={{fontWeight:800,fontSize:18}}>{viewW.name}</div>
          <div style={{fontSize:13,color:"#6b7280"}}>{viewW.date} · {viewW.dur} min</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
        {[{l:"Duration",v:viewW.dur+"m"},{l:"Volume",v:viewW.vol.toLocaleString()+" lbs"},{l:"Sets",v:viewW.sets}].map(x=>(
          <div key={x.l} style={{background:"#fff",borderRadius:12,padding:12,textAlign:"center"}}>
            <div style={{fontWeight:800,fontSize:18}}>{x.v}</div>
            <div style={{fontSize:12,color:"#6b7280"}}>{x.l}</div>
          </div>
        ))}
      </div>
      {viewW.exs.map((ex,i)=>(
        <div key={i} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>{ex.emoji} {ex.name}</div>
          {ex.sets.map((s,j)=>(
            <div key={j} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:j<ex.sets.length-1?"1px solid #f3f4f6":"none",fontSize:14}}>
              <span style={{color:"#6b7280",fontWeight:600}}>Set {s.type}</span>
              <span>{s.w?s.w+"lbs":"BW"} x {s.r||"?"} reps {s.done&&<span style={{color:"#22c55e"}}>✓</span>}</span>
            </div>
          ))}
        </div>
      ))}
      <button onClick={()=>{setWorkouts(p=>p.filter(w=>w.id!==viewW.id));setScreen("home");}}
        style={{width:"100%",padding:14,background:"#fee2e2",border:"none",borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",marginTop:8}}>
        Delete Workout
      </button>
    </div>
  );

  return (
    <div>
      <div style={{background:"#3b82f6",padding:"20px 16px 16px",color:"#fff"}}>
        <div style={{fontWeight:900,fontSize:26}}>ZenFit 🏋️</div>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #e5e7eb"}}>
        {["start","history"].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:"12px 0",fontWeight:700,fontSize:14,background:"none",border:"none",cursor:"pointer",borderBottom:tab===t?"2px solid #3b82f6":"2px solid transparent",color:tab===t?"#3b82f6":"#9ca3af",textTransform:"capitalize"}}>
            {t==="start"?"Start":"History"}
          </button>
        ))}
      </div>
      <div style={{padding:16}}>
        {tab==="start"&&(
          <>
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:13,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Quick Start</div>
              <button onClick={startEmpty} style={{width:"100%",padding:14,background:"#3b82f6",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer"}}>+ Start Empty Workout</button>
            </div>
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:13,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>My Templates</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {TEMPLATES.map(t=>(
                  <button key={t.id} onClick={()=>startTmpl(t)}
                    style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,textAlign:"left",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{t.name}</div>
                    <div style={{fontSize:12,color:"#9ca3af"}}>{t.exercises.slice(0,3).map(e=>e.name).join(", ")}{t.exercises.length>3?" & "+(t.exercises.length-3)+" more...":""}</div>
                  </button>
                ))}
              </div>
            </div>
            {workouts.length>0&&(
              <div>
                <div style={{fontWeight:700,fontSize:13,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Recent</div>
                {workouts.slice(0,2).map(w=>(
                  <button key={w.id} onClick={()=>{setViewW(w);setScreen("detail");}}
                    style={{display:"block",width:"100%",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:12,padding:14,marginBottom:8,textAlign:"left",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontWeight:700,fontSize:14}}>{w.name}</span>
                      <span style={{fontSize:12,color:"#9ca3af"}}>{w.date}</span>
                    </div>
                    <div style={{fontSize:12,color:"#6b7280"}}>⏱ {w.dur} min · 🏋️ {w.exs?.length||0} exercises · {(w.vol||0).toLocaleString()} lbs</div>
                  </button>
                ))}
              </div>
            )}
          </>
        )}
        {tab==="history"&&(
          workouts.length===0?(
            <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
              <div style={{fontSize:48,marginBottom:12}}>📋</div>
              <div style={{fontWeight:700,fontSize:18,marginBottom:6}}>No workouts yet</div>
              <div style={{fontSize:14}}>Complete your first workout to see it here.</div>
            </div>
          ):(
            <div>
              {workouts.map(w=>(
                <button key={w.id} onClick={()=>{setViewW(w);setScreen("detail");}}
                  style={{display:"block",width:"100%",background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,padding:14,marginBottom:10,textAlign:"left",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontWeight:700,fontSize:15}}>{w.name}</span>
                    <span style={{fontSize:12,color:"#9ca3af"}}>{w.date}</span>
                  </div>
                  <div style={{display:"flex",gap:12,fontSize:12,color:"#6b7280"}}>
                    <span>⏱ {w.dur} min</span>
                    <span>💪 {w.exs?.length||0} exercises</span>
                    <span>🏋️ {(w.vol||0).toLocaleString()} lbs</span>
                  </div>
                </button>
              ))}
            </div>
          )
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
