function RestTimer({ seconds, onDone }) {
  const [rem, setRem] = useState(seconds);
  useEffect(() => {
    if (rem <= 0) { onDone && onDone(); return; }
    const t = setTimeout(() => setRem(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [rem]);
  const pct = (rem / seconds) * 100;
  return (
    <div style={{display:"flex",alignItems:"center",padding:"6px 0",gap:8}}>
      <div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"#3b82f6",transition:"width 1s linear"}} />
      </div>
      <span style={{fontSize:12,color:"#3b82f6",fontWeight:700,minWidth:36}}>
        {Math.floor(rem/60)}:{String(rem%60).padStart(2,"0")}
      </span>
    </div>
  );
}

function WTimer({ start }) {
  const [el, setEl] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setEl(Math.floor((Date.now()-start)/1000)), 1000);
    return () => clearInterval(iv);
  }, [start]);
  const h=Math.floor(el/3600), m=Math.floor((el%3600)/60), s=el%60;
  return <span>{h>0?h+":":""}{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;
}

function App() {
  const [screen, setScreen] = useState("home");
  const [tab, setTab] = useState("start");
  const [workouts, setWorkouts] = useState(() => loadWorkouts());
  const [viewW, setViewW] = useState(null);
  const [wName, setWName] = useState("");
  const [exs, setExs] = useState([]);
  const [startT, setStartT] = useState(null);
  const [timers, setTimers] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [addMode, setAddMode] = useState("day");
  const [selDay, setSelDay] = useState("");
  const [repoCat, setRepoCat] = useState("");
  const [repoQ, setRepoQ] = useState("");
  const [customN, setCustomN] = useState("");
  const [showFinish, setShowFinish] = useState(false);

  const dateLabel = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const vol = (arr) => arr.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(parseFloat(s.w)||0)*(parseInt(s.r)||0),0),0);
  const setCount = (arr) => arr.reduce((a,e)=>a+e.sets.length,0);

  const getPrev = (name) => {
    const sorted = [...workouts].sort((a,b)=>b.id-a.id);
    for (const w of sorted) {
      const f = w.exs?.find(e=>e.name===name);
      if (f) {
        const v = f.sets.filter(s=>s.w&&s.r);
        if (v.length) {
          const best = [...v].sort((a,b)=>(parseFloat(b.w)*parseInt(b.r))-(parseFloat(a.w)*parseInt(a.r)))[0];
          return best.w+"lb x "+best.r;
        }
      }
    }
    return "";
  };

  const startTmpl = (tmpl) => {
    setStartT(Date.now()); setWName(tmpl.name);
    setExs(tmpl.exercises.map((e,i)=>({id:Date.now()+i,name:e.name,emoji:e.emoji,restT:120,
      sets:e.sets.map(s=>({...s,prev:getPrev(e.name)}))})));
    setTimers({}); setShowAdd(false); setScreen("workout");
  };

  const startEmpty = () => {
    setStartT(Date.now()); setWName("My Workout");
    setExs([]); setTimers({}); setShowAdd(false); setScreen("workout");
  };

  const addEx = (exObj) => {
    setExs(p=>[...p,{id:Date.now(),name:exObj.name,emoji:exObj.emoji||"\\u{1F4AA}",restT:120,
      sets:[{type:"1",prev:getPrev(exObj.name),w:"",r:"",done:false}]}]);
    setShowAdd(false); setSelDay(""); setCustomN(""); setRepoCat(""); setRepoQ(""); setAddMode("day");
  };

  const updSet = (eid,si,f,v) => setExs(p=>p.map(e=>e.id===eid?{...e,sets:e.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:e));

  const togDone = (eid,si) => setExs(p=>p.map(e=>{
    if(e.id!==eid) return e;
    const nd=!e.sets[si].done;
    const ns=e.sets.map((s,i)=>i===si?{...s,done:nd}:s);
    if(nd) setTimers(t=>({...t,[eid+"-"+si]:true}));
    else setTimers(t=>{const c={...t};delete c[eid+"-"+si];return c;});
    return {...e,sets:ns};
  }));

  const addSet = (eid) => setExs(p=>p.map(e=>{
    if(e.id!==eid) return e;
    return {...e,sets:[...e.sets,{type:String(e.sets.length+1),prev:getPrev(e.name),w:"",r:"",done:false}]};
  }));

  const saveW = () => {
    if(!exs.length) return;
    const dur=Math.round((Date.now()-startT)/60000);
    const w={id:Date.now(),name:wName,date:dateLabel,dur,exs,vol:vol(exs),sets:setCount(exs)};
    setWorkouts(p=>{const u=[w,...p];saveWorkouts(u);return u;});
    setShowFinish(false); setScreen("home");
  };

  const discardW = () => {setShowFinish(false); setScreen("home");};

  if (screen==="workout") return (
    <div style={{fontFamily:"Inter,sans-serif",background:"#fff",minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {showFinish && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,width:"100%",maxWidth:340,boxShadow:"0 8px 40px #0003"}}>
            <div style={{fontSize:36,textAlign:"center",marginBottom:8}}>\\u{1F3C1}</div>
            <h2 style={{fontWeight:800,fontSize:20,color:"#111",textAlign:"center",marginBottom:6}}>Finish Workout?</h2>
            <p style={{fontSize:13,color:"#6b7280",textAlign:"center",marginBottom:20}}>

            </p>
            <button onClick={saveW} style={{width:"100%",padding:14,background:"#22c55e",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:10}}>Save Workout</button>
            <button onClick={discardW} style={{width:"100%",padding:14,background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:10}}>Discard &amp; Exit</button>
            <button onClick={()=>setShowFinish(false)} style={{width:"100%",padding:12,background:"#f3f4f6",color:"#6b7280",border:"none",borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer"}}>Keep Training</button>
          </div>
        </div>
      )}

      <div style={{background:"#fff",padding:"14px 16px 10px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <span style={{fontWeight:700,fontSize:16,color:"#111"}}><WTimer start={startT}/></span>

      </div>

      <div style={{padding:"12px 16px 4px"}}>
        <div style={{fontWeight:800,fontSize:22,color:"#111",marginBottom:4}}>{wName}</div>
        <div style={{fontSize:13,color:"#9ca3af"}}>\\u{1F4C5} {dateLabel} &nbsp; \\u{1F550} <WTimer start={startT}/></div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"8px 0 100px"}}>
        {exs.map(ex=>(
          <div key={ex.id} style={{marginBottom:24,padding:"0 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:22}}>{ex.emoji}</span>
                <span style={{fontWeight:700,color:"#3b82f6",fontSize:16}}>{ex.name}</span>
              </div>
              <div style={{display:"flex",background:"#f3f4f6",borderRadius:20,overflow:"hidden"}}>
                {[60,120].map(rt=>(
                  <button key={rt} onClick={()=>setExs(p=>p.map(e=>e.id===ex.id?{...e,restT:rt}:e))}
                    style={{padding:"4px 10px",border:"none",background:ex.restT===rt?"#3b82f6":"transparent",color:ex.restT===rt?"#fff":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                    {rt===60?"1 min":"2 min"}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"40px 1fr 72px 72px 32px",gap:4,marginBottom:6,padding:"0 2px"}}>
              {["Set","Previous","lbs","Reps","\\u{2713}"].map(h=>(
                <span key={h} style={{fontWeight:700,fontSize:12,color:"#374151",textAlign:h==="lbs"||h==="Reps"||h==="\\u{2713}"?"center":"left"}}>{h}</span>
              ))}
            </div>
            {ex.sets.map((s,i)=>{
              const rk=ex.id+"-"+i;
              return (
                <React.Fragment key={i}>
                  <div style={{display:"grid",gridTemplateColumns:"40px 1fr 72px 72px 32px",gap:4,alignItems:"center",marginBottom:4}}>
                    <div style={{width:30,height:30,borderRadius:8,border:"2px solid #d1d5db",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"#374151",background:s.done?"#d1fae5":"#fff"}}>{s.type}</div>
                    <span style={{fontSize:12,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.prev||"\\u{2014}"}</span>
                    <input type="number" value={s.w} onChange={e=>updSet(ex.id,i,"w",e.target.value)}
                      style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}} />
                    <input type="number" value={s.r} onChange={e=>updSet(ex.id,i,"r",e.target.value)}
                      style={{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":"#f3f4f6",borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}} />
                    <div onClick={()=>togDone(ex.id,i)} style={{width:26,height:26,borderRadius:6,background:s.done?"#22c55e":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto"}}>
                      {s.done&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>\\u{2713}</span>}
                    </div>
                  </div>
                  {timers[rk]&&i<ex.sets.length-1&&(
                    <RestTimer seconds={ex.restT||120} onDone={()=>setTimers(t=>{const c={...t};delete c[rk];return c;})} />
                  )}
                  {!timers[rk]&&i<ex.sets.length-1&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0"}}>
                      <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                      <span style={{fontSize:10,color:"#9ca3af"}}>{ex.restT===60?"1:00":"2:00"} rest</span>
                      <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                    </div>
                  )}
                </React.Fragment>
              );
            })}
            <button onClick={()=>addSet(ex.id)} style={{marginTop:8,width:"100%",padding:"10px",background:"#f3f4f6",border:"none",borderRadius:10,color:"#374151",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              + Add Set
            </button>
          </div>
        ))}

        {!showAdd&&(
          <div style={{padding:"0 16px"}}>
            <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:14,background:"#fff",border:"2px dashed #d1d5db",borderRadius:12,color:"#6b7280",fontWeight:600,fontSize:15,cursor:"pointer"}}>+ Add Exercise</button>
          </div>
        )}

        {showAdd&&(
          <div style={{margin:"0 16px 16px",padding:16,background:"#fff",borderRadius:12,border:"1px solid #e5e7eb"}}>
            <p style={{fontWeight:700,fontSize:15,color:"#111",marginBottom:12}}>Add Exercise</p>
            <div style={{display:"flex",background:"#f3f4f6",borderRadius:12,padding:3,marginBottom:14,gap:3}}>
              {[{k:"day",label:"\\u{1F4CB} My Days"},{k:"repo",label:"\\u{1F3DB}\\u{FE0F} Library"},{k:"custom",label:"\\u{270F}\\u{FE0F} Custom"}].map(m=>(
                <button key={m.k} onClick={()=>{setAddMode(m.k);setSelDay("");setRepoCat("");setRepoQ("");}}
                  style={{flex:1,padding:"7px 4px",border:"none",borderRadius:10,background:addMode===m.k?"#fff":"transparent",color:addMode===m.k?"#111":"#6b7280",fontWeight:700,fontSize:11,cursor:"pointer",boxShadow:addMode===m.k?"0 1px 4px #0001":"none"}}>
                  {m.label}
                </button>
              ))}
            </div>

            {addMode==="day"&&(
              <>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                  {Object.keys(DAY_LIBRARY).map(d=>(
                    <button key={d} onClick={()=>setSelDay(d)}
                      style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",background:selDay===d?"#3b82f6":"#f3f4f6",color:selDay===d?"#fff":"#374151",fontWeight:600,fontSize:11}}>{d}</button>
                  ))}
                </div>
                {selDay&&(
                  <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
                    {DAY_LIBRARY[selDay].map(e=>(
                      <button key={e.name} onClick={()=>addEx(e)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                        <span style={{fontSize:18}}>{e.emoji}</span>
                        <span style={{fontWeight:600,color:"#1f2937",fontSize:13}}>{e.name}</span>
                      </button>
                    ))}
                  </div>
                )}
              </>
            )}

            {addMode==="repo"&&(
              <>
                <input value={repoQ} onChange={e=>setRepoQ(e.target.value)} placeholder="Search exercises..."
                  style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}} />
                {!repoQ&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                    {Object.keys(EXERCISE_REPO).map(cat=>(
                      <button key={cat} onClick={()=>setRepoCat(repoCat===cat?"":cat)}
                        style={{padding:"4px 9px",borderRadius:20,border:"none",cursor:"pointer",background:repoCat===cat?"#3b82f6":"#f3f4f6",color:repoCat===cat?"#fff":"#374151",fontWeight:600,fontSize:10}}>{cat}</button>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
                  {(()=>{
                    let entries=[];
                    if(repoQ.trim()){
                      Object.entries(EXERCISE_REPO).forEach(([cat,list])=>list.forEach(e=>{
                        if(e.name.toLowerCase().includes(repoQ.toLowerCase())) entries.push({...e,_cat:cat});
                      }));
                    } else {
                      const cats=repoCat?[repoCat]:Object.keys(EXERCISE_REPO);
                      cats.forEach(cat=>EXERCISE_REPO[cat].forEach(e=>entries.push({...e,_cat:cat})));
                    }
                    return entries.map((e,i)=>(
                      <button key={i} onClick={()=>addEx(e)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,border:"1px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",textAlign:"left"}}>
                        <span style={{fontSize:18}}>{e.emoji}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,color:"#1f2937",fontSize:13}}>{e.name}</div>
                          <div style={{fontSize:10,color:e.type==="Bodyweight"?"#10b981":e.type==="Cardio"?"#f59e0b":"#6b7280",fontWeight:600}}>{e.type} &middot; {e._cat}</div>
                        </div>
                      </button>
                    ));
                  })()}
                </div>
              </>
            )}

            {addMode==="custom"&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <p style={{fontSize:13,color:"#6b7280"}}>Type any exercise name:</p>
                <input value={customN} onChange={e=>setCustomN(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&customN.trim())addEx({name:customN.trim(),emoji:"\\u{1F4AA}"}); }}
                  placeholder="e.g. Cable Glute Kickback..."
                  style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none"}} />
                <button onClick={()=>customN.trim()&&addEx({name:customN.trim(),emoji:"\\u{1F4AA}"})}
                  disabled={!customN.trim()}
                  style={{width:"100%",padding:12,background:customN.trim()?"#3b82f6":"#d1d5db",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:customN.trim()?"pointer":"not-allowed"}}>
                  + Add "{customN||"Exercise"}"
                </button>
              </div>
            )}

            <button onClick={()=>{setShowAdd(false);setSelDay("");setAddMode("day");setRepoCat("");setRepoQ("");}}
              style={{marginTop:12,width:"100%",padding:10,background:"#f3f4f6",border:"none",borderRadius:8,color:"#6b7280",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          </div>

      </div>

  );

    <div style={{fontFamily:"Inter,sans-serif",background:"#f5f6fa",minHeight:"100vh",maxWidth:430,margin:"0 auto"}}>
      <div style={{background:"#fff",padding:16,borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#3b82f6"}}>&#8249;</button>

          <div style={{fontWeight:700,fontSize:17}}>{viewW.name}</div>

        </div>
      </div>
      <div style={{padding:16}}>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {[{l:"Duration",v:viewW.dur+"m"},{l:"Volume",v:viewW.vol.toLocaleString()+" lbs"},{l:"Sets",v:viewW.sets}].map(x=>(
            <div key={x.l} style={{flex:1,background:"#fff",borderRadius:12,padding:12,textAlign:"center",boxShadow:"0 1px 4px #0001"}}>
              <div style={{fontWeight:700,fontSize:20,color:"#3b82f6"}}>{x.v}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{x.l}</div>
            </div>
          ))}
        </div>
        {viewW.exs.map((ex,i)=>(
          <div key={i} style={{background:"#fff",borderRadius:12,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px #0001"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
              <span style={{fontSize:20}}>{ex.emoji}</span>
              <span style={{fontWeight:700,color:"#3b82f6",fontSize:15}}>{ex.name}</span>
            </div>
            {ex.sets.map((s,j)=>(
              <div key={j} style={{display:"flex",gap:12,padding:"5px 14px",borderTop:"1px solid #f3f4f6",fontSize:13,color:"#374151"}}>
                <span style={{fontWeight:700,minWidth:20}}>{s.type}</span>
                <span>{s.w?s.w+"lbs":"BW"} &times; {s.r||"?"} reps</span>
                {s.done&&<span style={{marginLeft:"auto",color:"#22c55e"}}>\\u{2713}</span>}

          style={{width:"100%",padding:14,background:"#fee2e2",border:"none",borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",marginTop:8}}>
          Delete Workout
        </button>
      </div>
    </div>
  );

  return (

                  <div style={{fontWeight:800,fontSize:13,color:"#111",lineHeight:1.3,marginBottom:6}}>{t.name}</div>
                  <p style={{fontSize:11,color:"#6b7280",margin:0,lineHeight:1.4}}>
