useEffect(()=>{if(rem<=0){onDone&&onDone();return;}const t=setTimeout(()=>setRem(r=>r-1),1000);return()=>clearTimeout(t);},[rem]);
const pct=(rem/seconds)*100;
return(<div style={{display:"flex",alignItems:"center",padding:"4px 0",gap:8}}>
<div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
<div style={{width:pct+"%",height:"100%",background:"#3b82f6",transition:"width 1s linear"}}/>
</div>
<span style={{fontSize:12,color:"#3b82f6",fontWeight:700,minWidth:36}}>
{Math.floor(rem/60)}:{String(rem%60).padStart(2,"0")}
</span></div>);}
function WTimer({st}){
const[el,setEl]=useState(0);
useEffect(()=>{const iv=setInterval(()=>setEl(Math.floor((Date.now()-st)/1000)),1000);return()=>clearInterval(iv);},[st]);
const h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
return <span>{h>0?h+":":""}{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;}"""
lines.append(comp)
