function mkSet(t,prev){return{t:t,w:"",r:"",done:false,prev:prev||""};}

function RestTimer(props){
  var sec=props.seconds,onDone=props.onDone;
  var rs=useState(sec); var rem=rs[0],setRem=rs[1];
  useEffect(function(){
    if(rem<=0){onDone&&onDone();return;}
    var t=setTimeout(function(){setRem(function(r){return r-1;});},1000);
    return function(){clearTimeout(t);};
  },[rem]);
  var pct=(rem/sec)*100;
  var mm=Math.floor(rem/60),ss=String(rem%60).padStart(2,"0");
  return h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#eff6ff",borderRadius:10,margin:"4px 0"}},
    h("div",{style:{width:36,height:36,borderRadius:"50%",background:"conic-gradient(#3b82f6 "+pct+"%, #e5e7eb "+pct+"%)",display:"flex",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{width:28,height:28,borderRadius:"50%",background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#3b82f6"}},mm+":"+ss)
    ),
    h("span",{style:{fontSize:13,color:"#3b82f6",fontWeight:600}},"Rest timer")
  );
}

function WTimer(props){
  var start=props.start;
  var es=useState(0); var el=es[0],setEl=es[1];
  useEffect(function(){
    var iv=setInterval(function(){setEl(Math.floor((Date.now()-start)/1000));},1000);
    return function(){clearInterval(iv);};
  },[start]);
  var hh=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
  return h("span",null,(hh>0?hh+":":"")+ String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"));
}

  function vol(arr){return arr.reduce(function(a,e){return a+e.sets.reduce(function(b,s){return b+(parseFloat(s.w)||0)*(parseInt(s.r)||0);},0);},0);}
  function sCount(arr){return arr.reduce(function(a,e){return a+e.sets.length;},0);}

  function getPrev(name){
    var sorted=[].concat(workouts).sort(function(a,b){return b.id-a.id;});
    for(var i=0;i<sorted.length;i++){
      var w=sorted[i];
      var f=w.exs&&w.exs.find(function(e){return e.name===name;});
      if(f){
        var v=f.sets.filter(function(s){return s.w&&s.r;});
        if(v.length){
          var best=v.slice().sort(function(a,b){return (parseFloat(b.w)*parseInt(b.r))-(parseFloat(a.w)*parseInt(a.r));})[0];
          return best.w+"lb x "+best.r;
        }
      }
    }
    return "";
  }

  function startTmpl(tmpl){
    setStartT(Date.now()); setWName(tmpl.name);
    setExs(tmpl.exercises.map(function(e,i){
      var prev=getPrev(e.name);
      return {id:Date.now()+i,name:e.name,e:e.e,restT:120,sets:e.sets.map(function(s){return mkSet(s.t,prev);})};
    }));

    setShowAdd(false); setSelDay(""); setCustomN(""); setRepoCat(""); setRepoQ(""); setAddMode("day");
  }

  function updSet(eid,si,f,v){
    setExs(function(p){return p.map(function(e){
      if(e.id!==eid)return e;
      return Object.assign({},e,{sets:e.sets.map(function(s,i){if(i!==si)return s; var o=Object.assign({},s); o[f]=v; return o;})});
    });});
  }

  function togDone(eid,si){
    setExs(function(p){return p.map(function(e){
      if(e.id!==eid)return e;
      var nd=!e.sets[si].done;
      var ns=e.sets.map(function(s,i){return i===si?Object.assign({},s,{done:nd}):s;});
      if(nd)setTimers(function(t){var c=Object.assign({},t); c[eid+"-"+si]=true; return c;});
      else setTimers(function(t){var c=Object.assign({},t); delete c[eid+"-"+si]; return c;});
      return Object.assign({},e,{sets:ns});
    });});
  }

  function addSet(eid){
    setExs(function(p){return p.map(function(e){
      if(e.id!==eid)return e;
      var prev=getPrev(e.name);
      return Object.assign({},e,{sets:e.sets.concat([mkSet(String(e.sets.length+1),prev)])});
    });});
  }

    if(!exs.length)return;

        h("div",{style:{fontSize:40,marginBottom:12}},"🏁"),
        h("div",{style:{fontWeight:800,fontSize:20,marginBottom:8}},"Finish Workout?"),
        h("div",{style:{color:C.gray,fontSize:14,marginBottom:20}},exs.length+" exercise"+(exs.length!==1?"s":"")+" · "+sCount(exs)+" sets · "+vol(exs).toLocaleString()+" lbs"),
        btn({width:"100%",padding:14,background:C.green,color:"#fff",borderRadius:12,fontWeight:700,fontSize:16,marginBottom:8},saveW,"Save Workout"),
        btn({width:"100%",padding:12,background:"#fee2e2",color:C.red,borderRadius:12,fontWeight:600,fontSize:14,marginBottom:8},function(){setShowFinish(false);setScreen("home");},"Discard & Exit"),
        btn({width:"100%",padding:12,background:C.light,color:C.gray,borderRadius:12,fontWeight:600,fontSize:14},function(){setShowFinish(false);},"Keep Training")
      )
    );

    var topBar=h("div",{style:{position:"sticky",top:0,zIndex:10,background:"#fff",borderBottom:"1px solid "+C.border,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      btn({background:"none",fontSize:22,color:C.blue,padding:"4px 8px"},function(){setScreen("home");},"↩"),
      h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontWeight:800,fontSize:16}},wName),
        h("div",{style:{fontSize:12,color:C.gray}},startT&&h(WTimer,{start:startT}))
      ),
      btn({background:exs.length?C.green:"#9ca3af",color:"#fff",borderRadius:10,padding:"8px 16px",fontWeight:700,fontSize:14},function(){setShowFinish(true);},"Finish")
    );

    var exCards=exs.map(function(ex){
      return h("div",{key:ex.id,style:{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
          h("div",{style:{fontWeight:700,fontSize:16}},ex.e+" "+ex.name),
          h("div",{style:{display:"flex",gap:4}},
            [60,120].map(function(rt){
              return btn({padding:"4px 10px",borderRadius:8,background:ex.restT===rt?C.blue:C.light,color:ex.restT===rt?"#fff":C.gray,fontWeight:700,fontSize:11},
                function(){setExs(function(p){return p.map(function(e){return e.id===ex.id?Object.assign({},e,{restT:rt}):e;});});},
                rt===60?"1 min":"2 min");
            })
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"40px 1fr 70px 70px 36px",gap:4,marginBottom:4}},
          ["Set","Prev","lbs","Reps","\u2713"].map(function(hd){return h("div",{key:hd,style:{textAlign:"center",fontSize:11,fontWeight:600,color:"#9ca3af"}},hd);})
        ),
        ex.sets.map(function(s,i){
          var rk=ex.id+"-"+i;
          return h("div",{key:i},
            h("div",{style:{display:"grid",gridTemplateColumns:"40px 1fr 70px 70px 36px",gap:4,alignItems:"center",marginBottom:2}},
              h("div",{style:{textAlign:"center",fontWeight:700,fontSize:13,color:C.gray}},s.t),
              h("div",{style:{textAlign:"center",fontSize:11,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},s.prev||"—"),
              h("input",{value:s.w,inputMode:"decimal",placeholder:"0",onChange:function(ev){updSet(ex.id,i,"w",ev.target.value);},
                style:{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":C.light,borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}}),
              h("input",{value:s.r,inputMode:"numeric",placeholder:"0",onChange:function(ev){updSet(ex.id,i,"r",ev.target.value);},
                style:{textAlign:"center",fontWeight:700,fontSize:15,border:"none",background:s.done?"#d1fae5":C.light,borderRadius:8,outline:"none",width:"100%",padding:"7px 2px"}}),
              h("div",{onClick:function(){togDone(ex.id,i);},
                style:{width:26,height:26,borderRadius:6,background:s.done?C.green:"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",margin:"0 auto",color:"#fff",fontSize:14,fontWeight:700}},
                s.done?"\u2713":"")
            ),
            timers[rk]&&h(RestTimer,{seconds:ex.restT,onDone:function(){setTimers(function(t){var c=Object.assign({},t);delete c[rk];return c;});}}),
            !timers[rk]&&i<ex.sets.length-1&&h("div",{style:{textAlign:"center",fontSize:11,color:"#d1d5db",padding:"2px 0"}},(ex.restT===60?"1:00":"2:00")+" rest")
          );
        }),
        btn({marginTop:8,width:"100%",padding:10,background:C.light,borderRadius:10,color:"#374151",fontWeight:700,fontSize:13},function(){addSet(ex.id);},"+ Add Set")
      );
    });

    var addPanel=showAdd&&h("div",{style:{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}},
      h("div",{style:{fontWeight:700,fontSize:16,marginBottom:12}},"Add Exercise"),
      h("div",{style:{display:"flex",background:C.light,borderRadius:12,padding:4,marginBottom:14,gap:4}},
        [{k:"day",label:"📋 My Days"},{k:"repo",label:"🏛️ Library"},{k:"custom",label:"✏️ Custom"}].map(function(m){
          return btn({flex:1,padding:"7px 4px",borderRadius:10,background:addMode===m.k?"#fff":"transparent",color:addMode===m.k?"#111":C.gray,fontWeight:700,fontSize:11,boxShadow:addMode===m.k?"0 1px 4px rgba(0,0,0,0.06)":"none"},
            function(){setAddMode(m.k);setSelDay("");setRepoCat("");setRepoQ("");},m.label);
        })
      ),
      addMode==="day"&&h("div",null,
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}},
          Object.keys(DAY_LIB).map(function(d){
            return btn({padding:"5px 11px",borderRadius:20,background:selDay===d?C.blue:C.light,color:selDay===d?"#fff":"#374151",fontWeight:600,fontSize:11},
              function(){setSelDay(d);},d);
          })
        ),
        selDay&&h("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}},
          DAY_LIB[selDay].map(function(e){
            return btn({display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"1px solid "+C.border,background:"#f9fafb",textAlign:"left",width:"100%"},
              function(){addEx(e);},e.e+" "+e.name);
          })
        )
      ),
      addMode==="repo"&&h("div",null,
        h("input",{value:repoQ,placeholder:"Search exercises...",onChange:function(ev){setRepoQ(ev.target.value);},
          style:{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}}),
        !repoQ&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}},
          Object.keys(REPO).map(function(cat){
            return btn({padding:"4px 9px",borderRadius:20,background:repoCat===cat?C.blue:C.light,color:repoCat===cat?"#fff":"#374151",fontWeight:600,fontSize:10},
              function(){setRepoCat(repoCat===cat?"":cat);},cat);
          })
        ),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}},
          (function(){
            var entries=[];
            if(repoQ.trim()){
              Object.keys(REPO).forEach(function(cat){REPO[cat].forEach(function(e){if(e.name.toLowerCase().indexOf(repoQ.toLowerCase())>=0)entries.push(Object.assign({},e,{_cat:cat}));});});
            } else {
              var cats=repoCat?[repoCat]:Object.keys(REPO);
              cats.forEach(function(cat){REPO[cat].forEach(function(e){entries.push(Object.assign({},e,{_cat:cat}));});});
            }
            return entries.map(function(e,i){
              return btn({display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,border:"1px solid "+C.border,background:"#f9fafb",textAlign:"left",width:"100%"},
                function(){addEx(e);},
                h("div",null,h("div",{style:{fontWeight:600,fontSize:14}},e.e+" "+e.name),h("div",{style:{fontSize:11,color:"#9ca3af"}},e.type+" · "+e._cat)));
            });
          })()
        )
      ),
      addMode==="custom"&&h("div",null,
        h("div",{style:{fontSize:13,color:C.gray,marginBottom:8}},"Type any exercise name:"),
        h("input",{value:customN,placeholder:"e.g. Hip Thrust...",onChange:function(ev){setCustomN(ev.target.value);},
          onKeyDown:function(ev){if(ev.key==="Enter"&&customN.trim())addEx({name:customN.trim(),e:"💪"});},
          style:{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,outline:"none",marginBottom:10}}),
        btn({width:"100%",padding:12,background:customN.trim()?C.blue:"#d1d5db",color:"#fff",borderRadius:10,fontWeight:700,fontSize:15},
          function(){if(customN.trim())addEx({name:customN.trim(),e:"💪"});},
          '+ Add "'+(customN||"Exercise")+'"')
      ),
      btn({marginTop:12,width:"100%",padding:10,background:C.light,borderRadius:8,color:C.gray,fontWeight:600},
        function(){setShowAdd(false);setSelDay("");setAddMode("day");setRepoCat("");setRepoQ("");},"Cancel")
    );

    return h("div",{style:{paddingBottom:40}},
      finishModal, topBar,
      h("div",{style:{padding:"12px 16px"}},
        h("div",{style:{fontSize:13,color:"#9ca3af",marginBottom:12}},"📅 "+dateLabel),
        exCards,
        !showAdd&&btn({width:"100%",padding:14,background:"#fff",border:"2px dashed #d1d5db",borderRadius:12,color:C.gray,fontWeight:600,fontSize:15},function(){setShowAdd(true);},"+ Add Exercise"),
        addPanel
      )
    );
  }

  // ── DETAIL SCREEN ──────────────────────────────────────────────────────────
  if(screen==="detail"&&viewW){
    return h("div",{style:{padding:16}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:16}},
        btn({background:"none",fontSize:24,color:C.blue,padding:"4px 8px"},function(){setScreen("home");},"‹"),
        h("div",null,
          h("div",{style:{fontWeight:800,fontSize:18}},viewW.name),
          h("div",{style:{fontSize:13,color:C.gray}},viewW.date+" · "+viewW.dur+" min")
        )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}},
        [{l:"Duration",v:viewW.dur+"m"},{l:"Volume",v:viewW.vol.toLocaleString()+" lbs"},{l:"Sets",v:viewW.sets}].map(function(x){
          return h("div",{key:x.l,style:{background:"#fff",borderRadius:12,padding:12,textAlign:"center"}},
            h("div",{style:{fontWeight:800,fontSize:18}},x.v),
            h("div",{style:{fontSize:12,color:C.gray}},x.l)
          );
        })
      ),
      viewW.exs.map(function(ex,i){
        return h("div",{key:i,style:{background:"#fff",borderRadius:14,padding:14,marginBottom:10}},
          h("div",{style:{fontWeight:700,fontSize:15,marginBottom:8}},ex.e+" "+ex.name),
          ex.sets.map(function(s,j){
            return h("div",{key:j,style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:j<ex.sets.length-1?"1px solid #f3f4f6":"none",fontSize:14}},
              h("span",{style:{color:C.gray,fontWeight:600}},"Set "+s.t),
              h("span",null,(s.w?s.w+"lbs":"BW")+" x "+(s.r||"?")+" reps "+(s.done?"\u2713":""))
            );
          })
        );
      }),
      btn({width:"100%",padding:14,background:"#fee2e2",borderRadius:12,color:C.red,fontWeight:700,marginTop:8},
        function(){setWorkouts(function(p){var u=p.filter(function(w){return w.id!==viewW.id;});save(u);return u;});setScreen("home");},"Delete Workout")
    );
  }

  // ── HOME SCREEN ────────────────────────────────────────────────────────────
  return h("div",null,
    h("div",{style:{background:C.blue,padding:"20px 16px 16px",color:"#fff"}},
      h("div",{style:{fontWeight:900,fontSize:28}},"ZenFit \uD83C\uDFCB\uFE0F"),
      h("div",{style:{fontSize:13,opacity:0.8,marginTop:2}},"Your personal gym tracker")
    ),
    h("div",{style:{display:"flex",background:"#fff",borderBottom:"1px solid "+C.border}},
      ["start","history"].map(function(t){
        return btn({flex:1,padding:"12px 0",fontWeight:700,fontSize:14,background:"none",borderBottom:tab===t?"2px solid "+C.blue:"2px solid transparent",color:tab===t?C.blue:"#9ca3af",textTransform:"capitalize"},
          function(){setTab(t);},t==="start"?"Start":"History");
      })
    ),
    h("div",{style:{padding:16}},
      tab==="start"&&h("div",null,
        h("div",{style:{marginBottom:20}},
          h("div",{style:{fontWeight:700,fontSize:12,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}},"Quick Start"),
          btn({width:"100%",padding:14,background:C.blue,color:"#fff",borderRadius:12,fontWeight:700,fontSize:16},startEmpty,"+ Start Empty Workout")
        ),
        h("div",{style:{marginBottom:20}},
          h("div",{style:{fontWeight:700,fontSize:12,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}},"My Templates"),
          TEMPLATES.map(function(t){
            return btn({display:"block",width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:14,padding:14,textAlign:"left",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"},
              function(){startTmpl(t);},
              h("div",null,
                h("div",{style:{fontWeight:700,fontSize:15,marginBottom:4}},t.name),
                h("div",{style:{fontSize:12,color:"#9ca3af"}},t.exercises.slice(0,3).map(function(e){return e.name;}).join(", ")+(t.exercises.length>3?" & "+(t.exercises.length-3)+" more...":""))
              )
            );
          })
        ),
        workouts.length>0&&h("div",null,
          h("div",{style:{fontWeight:700,fontSize:12,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:1}},"Recent"),
          workouts.slice(0,2).map(function(w){
            return btn({display:"block",width:"100%",background:"#f9fafb",border:"1px solid "+C.border,borderRadius:12,padding:14,marginBottom:8,textAlign:"left"},
              function(){setViewW(w);setScreen("detail");},
              h("div",null,
                h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                  h("span",{style:{fontWeight:700,fontSize:14}},w.name),
                  h("span",{style:{fontSize:12,color:"#9ca3af"}},w.date)
                ),
                h("div",{style:{fontSize:12,color:C.gray}},"\u23f1 "+w.dur+" min · \uD83C\uDFCB\uFE0F "+(w.exs&&w.exs.length||0)+" exercises · "+(w.vol||0).toLocaleString()+" lbs")
              )
            );
          })
        )
      ),
      tab==="history"&&(
        workouts.length===0
          ?h("div",{style:{textAlign:"center",padding:60,color:"#9ca3af"}},
              h("div",{style:{fontSize:48,marginBottom:12}},"📋"),
              h("div",{style:{fontWeight:700,fontSize:18,marginBottom:6}},"No workouts yet"),
              h("div",{style:{fontSize:14}},"Complete your first workout to see it here.")
            )
          :h("div",null,
              workouts.map(function(w){
                return btn({display:"block",width:"100%",background:"#fff",border:"1px solid "+C.border,borderRadius:14,padding:14,marginBottom:10,textAlign:"left",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"},
                  function(){setViewW(w);setScreen("detail");},
                  h("div",null,
                    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                      h("span",{style:{fontWeight:700,fontSize:15}},w.name),
                      h("span",{style:{fontSize:12,color:"#9ca3af"}},w.date)
                    ),
                    h("div",{style:{display:"flex",gap:12,fontSize:12,color:C.gray}},
                      h("span",null,"\u23f1 "+w.dur+" min"),
                      h("span",null,"\uD83D\uDCAA "+(w.exs&&w.exs.length||0)+" exercises"),
                      h("span",null,"\uD83C\uDFCB\uFE0F "+(w.vol||0).toLocaleString()+" lbs")
                    )
                  )
                );
              })
            )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
}
</script>
</body>
</html>
